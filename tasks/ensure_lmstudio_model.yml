---
# Download the configured LM Studio model and verify it exists on disk before load.
# Requires: lmstudio_home, lmstudio_lms_cmd, target_home, hermes_path_prefix, lmstudio_effective_model,
#           lmstudio_model_base_id, lmstudio_model_download_target, lmstudio_get_cli_flags,
#           hermes_model_api_key
# Sets: lmstudio_model_on_disk, lmstudio_runtime_model, lmstudio_disk_model_key, lmstudio_load_candidates

- name: Define LM Studio CLI environment (model download)
  import_tasks: lmstudio_cli_environment.yml

- name: Ensure Hermes log directory exists (for lms get output)
  file:
    path: "{{ target_home }}/.hermes/logs"
    state: directory
    mode: '0755'
  become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
  become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

- name: List LM Studio models on disk (initial check)
  include_tasks: verify_lmstudio_model_on_disk.yml

- name: Note configured model already on disk
  debug:
    msg: >-
      LM Studio model already on disk: {{ lmstudio_disk_model_key | default('(unresolved)') }}
      (will still run lms get --yes to ensure download is complete)
  when:
    - lmstudio_model_on_disk | default(false) | bool
    - lmstudio_download_model | default(true) | bool

- name: Download LM Studio model (macOS)
  shell: >-
    "{{ lmstudio_lms_cmd }}" get {{ lmstudio_model_download_target | quote }}
    {{ lmstudio_get_cli_flags }}
    >> "{{ target_home }}/.hermes/logs/lms-get.log" 2>&1
  environment: "{{ lmstudio_cli_env }}"
  async: 7200
  poll: 60
  register: lms_get_macos
  when:
    - ansible_facts['os_family'] != 'Debian'
    - lmstudio_download_model | default(true) | bool
  become: false

- name: Download LM Studio model (Linux / WSL2)
  shell: >-
    "{{ lmstudio_lms_cmd }}" get {{ lmstudio_model_download_target | quote }}
    {{ lmstudio_get_cli_flags }}
    >> "{{ target_home }}/.hermes/logs/lms-get.log" 2>&1
  environment: "{{ lmstudio_cli_env }}"
  async: 7200
  poll: 60
  register: lms_get_linux
  when:
    - ansible_facts['os_family'] == 'Debian'
    - lmstudio_download_model | default(true) | bool
  become: true
  become_user: "{{ target_user }}"

- name: Read LM Studio download log tail when get command failed
  include_tasks: read_lmstudio_get_log_tail.yml
  when:
    - lmstudio_download_model | default(true) | bool
    - >-
      (
        (lms_get_macos is defined and not (lms_get_macos.skipped | default(false) | bool) and (lms_get_macos.failed | default(false) | bool))
        or (lms_get_linux is defined and not (lms_get_linux.skipped | default(false) | bool) and (lms_get_linux.failed | default(false) | bool))
      )

- name: Warn when LM Studio model download command failed (will verify on disk next)
  debug:
    msg: >-
      `lms get` returned non-zero; checking whether model is already on disk.
      Log: {{ target_home }}/.hermes/logs/lms-get.log
      Last lines: {{ lms_get_log_tail.stdout | default('(empty)') }}
  when:
    - lmstudio_download_model | default(true) | bool
    - >-
      (
        (lms_get_macos is defined and not (lms_get_macos.skipped | default(false) | bool) and (lms_get_macos.failed | default(false) | bool))
        or (lms_get_linux is defined and not (lms_get_linux.skipped | default(false) | bool) and (lms_get_linux.failed | default(false) | bool))
      )

- name: Wait for LM Studio model to appear on disk after download
  include_tasks: verify_lmstudio_model_on_disk.yml
  vars:
    lmstudio_wait_for_download: true
  when: lmstudio_download_model | default(true) | bool

- name: Verify configured LM Studio model is on disk before load
  include_tasks: verify_lmstudio_model_on_disk.yml
  when: lmstudio_load_model | default(true) | bool

- name: Read LM Studio download log before on-disk failure
  include_tasks: read_lmstudio_get_log_tail.yml
  when:
    - lmstudio_load_model | default(true) | bool
    - not (lmstudio_model_on_disk | default(false) | bool)

- name: Require configured LM Studio model on disk
  fail:
    msg: >-
      LM Studio model {{ lmstudio_model_base_id }} is not on disk after automated download.
      Command run:
      {{ lmstudio_lms_cmd }} get {{ lmstudio_model_download_target }} {{ lmstudio_get_cli_flags }}
      Check download log: {{ target_home }}/.hermes/logs/lms-get.log
      Models found on disk: {{ lms_disk_model_paths | default(lms_disk_model_keys | default([])) | join(', ') if ((lms_disk_model_paths | default([]) | length > 0) or (lms_disk_model_keys | default([]) | length > 0)) else '(none)' }}
      Last log lines:
      {{ lms_get_log_tail.stdout | default('(log empty or missing)') }}
      Re-run: ./deploy_local.sh
  when:
    - lmstudio_load_model | default(true) | bool
    - not (lmstudio_model_on_disk | default(false) | bool)
