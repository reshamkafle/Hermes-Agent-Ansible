---
# Confirm the configured LM Studio model exists on disk and resolve load candidate keys.
# Requires: lmstudio_lms_cmd, lmstudio_model_base_id, target_home, hermes_path_prefix, hermes_model_api_key
# Optional: lmstudio_wait_for_download, lmstudio_wait_retries, lmstudio_wait_delay
# Sets: lms_disk_model_keys, lmstudio_disk_model_key, lmstudio_load_candidates, lmstudio_model_on_disk

- name: Define LM Studio CLI environment (verify)
  import_tasks: lmstudio_cli_environment.yml

- name: Check LM Studio daemon before disk model verify
  command: "{{ lmstudio_lms_cmd }} daemon status"
  environment: "{{ lmstudio_cli_env }}"
  register: lms_daemon_verify
  changed_when: false
  failed_when: false
  become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
  become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

- name: Set LM Studio daemon running flag (verify preflight)
  set_fact:
    lms_daemon_verify_running: >-
      {{
        lms_daemon_verify.rc == 0
        and ('not-running' not in (lms_daemon_verify.stdout | lower))
        and ('not running' not in (lms_daemon_verify.stdout | lower))
      }}

- name: Start LM Studio daemon when not running (verify preflight)
  command: "{{ lmstudio_lms_cmd }} daemon up"
  environment: "{{ lmstudio_cli_env }}"
  register: lms_daemon_up_verify
  changed_when: false
  failed_when: false
  async: "{{ lmstudio_daemon_up_async_seconds | default(300) }}"
  poll: 10
  when: not (lms_daemon_verify_running | default(false) | bool)
  become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
  become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

- name: Start LM Studio API server before disk listing (verify preflight)
  command: "{{ lmstudio_lms_cmd }} server start --port {{ lmstudio_server_port | default(1234) }}"
  environment: "{{ lmstudio_cli_env }}"
  changed_when: false
  failed_when: false
  when:
    - ansible_facts['os_family'] != 'Debian'
    - lmstudio_start_server | default(true) | bool
  become: false

- name: Read LM Studio download log before disk verify
  include_tasks: read_lmstudio_get_log_tail.yml

- name: Build LM Studio model match needles for disk verify
  include_tasks: build_lmstudio_match_needles.yml

- name: Poll until LM Studio model appears on disk after download
  include_tasks: lmstudio_disk_poll_cycle.yml
  loop: "{{ range(1, (lmstudio_wait_retries | default(36) | int) + 1) | list }}"
  loop_control:
    loop_var: lmstudio_disk_poll_attempt
    label: "disk check {{ lmstudio_disk_poll_attempt }}/{{ lmstudio_wait_retries | default(36) }}"
  when:
    - lmstudio_wait_for_download | default(false) | bool
    - not (lmstudio_model_on_disk | default(false) | bool)

- name: Check LM Studio model on disk (single pass)
  include_tasks: lmstudio_check_disk_once.yml
  when: not (lmstudio_wait_for_download | default(false) | bool)

- name: Show LM Studio disk listing summary (verify)
  debug:
    msg: >-
      `lms ls` rc={{ lms_ls_raw.rc | default('?') }} |
      on disk={{ lmstudio_model_on_disk | default(false) }} |
      primary key={{ lmstudio_disk_model_key | default('(none)') }} |
      disk paths={{ lms_disk_model_paths | default([]) | join(', ') }} |
      load candidates={{ lmstudio_load_candidates | default([]) | join(', ') }}

- name: Read LM Studio download log before verify failure
  include_tasks: read_lmstudio_get_log_tail.yml
  when:
    - lmstudio_wait_for_download | default(false) | bool
    - not (lmstudio_model_on_disk | default(false) | bool)

- name: Fail when LM Studio model did not appear on disk after download wait
  fail:
    msg: >-
      Timed out waiting for {{ lmstudio_model_base_id }} to appear on disk
      ({{ lmstudio_wait_retries | default(36) }} checks every
      {{ lmstudio_wait_delay | default(10) }}s).
      Match needles tried: {{ lmstudio_match_needles | default([]) | join(', ') }}.
      `lms ls` best rc={{ lms_ls_raw.rc | default('?') }}.
      Daemon status: {{ lms_daemon_verify.stdout | default('') | trim }}
      Models on disk: {{ lms_disk_model_paths | default(lms_disk_model_keys | default([])) | join(', ') if ((lms_disk_model_paths | default([]) | length > 0) or (lms_disk_model_keys | default([]) | length > 0)) else '(none)' }}
      Log confirms download: {{ lmstudio_log_confirms_download | default(false) }} |
      log load key: {{ lmstudio_log_load_key | default('(none)') }}
      Download log: {{ target_home }}/.hermes/logs/lms-get.log
      Last log lines:
      {{ lms_get_log_tail.stdout | default('(log empty or missing)') }}
      Re-run: ./deploy_local.sh
  when:
    - lmstudio_wait_for_download | default(false) | bool
    - not (lmstudio_model_on_disk | default(false) | bool)

- name: Warn when LM Studio disk listing command failed (verify)
  debug:
    msg: >-
      `lms ls --json --llm` failed (rc={{ lms_ls_raw.rc | default('?') }}).
      stderr: {{ lms_ls_raw.stderr | default('(empty)') | trim }}
      stdout: {{ lms_ls_raw.stdout | default('(empty)') | trim | truncate(400, True, '...') }}
      Daemon status: {{ lms_daemon_verify.stdout | default('') | trim }}
      Ensure the LM Studio daemon is running: {{ lmstudio_lms_cmd }} daemon up
  when:
    - not (lmstudio_wait_for_download | default(false) | bool)
    - lms_ls_raw.rc | default(1) != 0
