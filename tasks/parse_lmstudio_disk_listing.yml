---
# Parse `lms ls --json` output into model keys and load candidates.
# Requires: lms_ls_raw (register result from lms ls), lmstudio_model_base_id
# Sets: lms_ls_parsed_models, lms_disk_model_keys, lmstudio_model_slug,
#       lmstudio_disk_model_key, lmstudio_load_candidates, lmstudio_model_on_disk

- name: Parse LM Studio disk listing JSON
  set_fact:
    lms_ls_parsed_models: >-
      {%- if lms_ls_raw.rc | default(1) == 0 -%}
      {%- set raw = lms_ls_raw.stdout | default('[]') | trim -%}
      {%- if raw | length > 0 and raw[0] == '[' -%}
      {{ raw | from_json | default([]) }}
      {%- else -%}
      []
      {%- endif -%}
      {%- else -%}
      []
      {%- endif -%}
    lmstudio_model_slug: "{{ lmstudio_model_base_id.split('/')[-1] | lower }}"

- name: Build disk model key list from LM Studio listing
  set_fact:
    lms_disk_model_keys: >-
      {%- set models = lms_ls_parsed_models | default([]) -%}
      {%- set keys = [] -%}
      {%- for m in models -%}
      {%- for field in ['modelKey', 'key', 'identifier', 'indexedModelIdentifier', 'path'] -%}
      {%- if m[field] is defined and (m[field] | string | trim | length) > 0 -%}
      {%- set _ = keys.append(m[field] | string) -%}
      {%- endif -%}
      {%- endfor -%}
      {%- if m.variants is defined -%}
      {%- for v in m.variants -%}
      {%- if v is string and (v | trim | length) > 0 -%}
      {%- set _ = keys.append(v) -%}
      {%- elif v is mapping -%}
      {%- for vf in ['modelKey', 'key', 'identifier'] -%}
      {%- if v[vf] is defined and (v[vf] | string | trim | length) > 0 -%}
      {%- set _ = keys.append(v[vf] | string) -%}
      {%- endif -%}
      {%- endfor -%}
      {%- endif -%}
      {%- endfor -%}
      {%- endif -%}
      {%- endfor -%}
      {{ keys | unique | list }}

- name: Test whether an LM Studio disk key matches the configured model
  set_fact:
    lmstudio_key_matches_config: >-
      {{
        (key | lower) == (lmstudio_model_base_id | lower)
        or ((key | lower | regex_replace('.*/', '')) == (lmstudio_model_slug | default('')))
      }}
  vars:
    key: "{{ item }}"
  loop: "{{ lms_disk_model_keys | default([]) }}"
  loop_control:
    label: "{{ item }}"
  register: lmstudio_key_match_results
  when: lms_disk_model_keys | default([]) | length > 0

- name: Collect matched LM Studio keys for load
  set_fact:
    lmstudio_matched_keys: >-
      {{
        lmstudio_key_match_results.results | default([])
        | selectattr('ansible_facts.lmstudio_key_matches_config', 'defined')
        | selectattr('ansible_facts.lmstudio_key_matches_config')
        | map(attribute='item')
        | list
        | unique
      }}
  when: lmstudio_key_match_results is defined

- name: Default empty matched LM Studio key list
  set_fact:
    lmstudio_matched_keys: []
  when: lmstudio_key_match_results is not defined

- name: Resolve LM Studio load candidate keys
  set_fact:
    lmstudio_load_candidates: >-
      {{
        lmstudio_matched_keys
        if (lmstudio_matched_keys | default([]) | length > 0)
        else [lmstudio_model_base_id]
      }}
    lmstudio_disk_model_key: >-
      {{
        lmstudio_matched_keys | first
        if (lmstudio_matched_keys | default([]) | length > 0)
        else lmstudio_model_base_id
      }}
    lmstudio_runtime_model: >-
      {{
        lmstudio_matched_keys | first
        if (lmstudio_matched_keys | default([]) | length > 0)
        else lmstudio_model_base_id
      }}
    lmstudio_model_on_disk: "{{ (lmstudio_matched_keys | default([]) | length) > 0 }}"
