---
# Parse `lms ls --json` output into model paths/keys and load candidates.
# `lms load` fuzzy-matches on model.path (see lmstudio-ai/lms load.ts), not slug aliases.
# Requires: lms_ls_raw (register result from lms ls), lmstudio_model_base_id
# Sets: lms_ls_parsed_models, lms_ls_flat_models, lms_disk_model_paths, lms_disk_model_keys,
#       lmstudio_model_slug, lmstudio_disk_model_key, lmstudio_load_candidates,
#       lmstudio_model_on_disk

- name: Parse LM Studio disk listing JSON
  set_fact:
    lms_ls_parsed_models: >-
      {%- if lms_ls_raw.rc | default(1) == 0 -%}
      {%- set raw = lms_ls_raw.stdout | default('[]') | trim -%}
      {%- if raw | length > 0 and raw[0] == '[' -%}
      {{ raw | from_json | default([]) }}
      {%- else -%}
      []
      {%- endif -%}
      {%- else -%}
      []
      {%- endif -%}
    lmstudio_model_slug: "{{ lmstudio_model_base_id.split('/')[-1] | lower }}"

- name: Normalize LM Studio disk listing to flat model entries
  set_fact:
    lms_ls_flat_models: >-
      {%- set parsed = lms_ls_parsed_models | default([]) -%}
      {%- set flat = [] -%}
      {%- for item in parsed -%}
        {%- if item.model is defined -%}
          {%- set _ = flat.append(item.model) -%}
          {%- for v in item.variants | default([]) -%}
            {%- if v is mapping -%}
              {%- set _ = flat.append(v) -%}
            {%- endif -%}
          {%- endfor -%}
        {%- else -%}
          {%- set _ = flat.append(item) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ flat }}

- name: Build disk model path and key lists from LM Studio listing
  set_fact:
    lms_disk_model_paths: >-
      {%- set models = lms_ls_flat_models | default([]) -%}
      {%- set paths = [] -%}
      {%- for m in models -%}
        {%- if m.path is defined and (m.path | string | trim | length) > 0 -%}
          {%- set _ = paths.append(m.path | string) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ paths | unique | list }}
    lms_disk_model_keys: >-
      {%- set models = lms_ls_flat_models | default([]) -%}
      {%- set keys = [] -%}
      {%- for m in models -%}
        {%- if m.path is defined and (m.path | string | trim | length) > 0 -%}
          {%- set _ = keys.append(m.path | string) -%}
        {%- endif -%}
        {%- for field in ['modelKey', 'key', 'identifier', 'indexedModelIdentifier'] -%}
          {%- if m[field] is defined and (m[field] | string | trim | length) > 0 -%}
            {%- set _ = keys.append(m[field] | string) -%}
          {%- endif -%}
        {%- endfor -%}
        {%- if m.variants is defined -%}
          {%- for v in m.variants -%}
            {%- if v is string and (v | trim | length) > 0 -%}
              {%- set _ = keys.append(v) -%}
            {%- elif v is mapping -%}
              {%- if v.path is defined and (v.path | string | trim | length) > 0 -%}
                {%- set _ = keys.append(v.path | string) -%}
              {%- endif -%}
              {%- for vf in ['modelKey', 'key', 'identifier'] -%}
                {%- if v[vf] is defined and (v[vf] | string | trim | length) > 0 -%}
                  {%- set _ = keys.append(v[vf] | string) -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ keys | unique | list }}

- name: Drop MLX disk paths when vars.yml targets GGUF
  set_fact:
    lms_disk_model_paths: >-
      {%- set out = [] -%}
      {%- for p in lms_disk_model_paths | default([]) | map('string') | list -%}
        {%- set pl = p | lower -%}
        {%- if not ('-mlx' in pl or '/mlx' in pl or '[mlx]' in pl or '_mlx' in pl) -%}
          {%- set _ = out.append(p) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ out }}
    lms_disk_model_keys: >-
      {%- set out = [] -%}
      {%- for k in lms_disk_model_keys | default([]) | map('string') | list -%}
        {%- set kl = k | lower -%}
        {%- if not ('-mlx' in kl or '/mlx' in kl or '[mlx]' in kl or '_mlx' in kl) -%}
          {%- set _ = out.append(k) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ out }}
  when: lmstudio_prefers_gguf | default(false) | bool

- name: Test whether an LM Studio disk path/key matches the configured model
  set_fact:
    lmstudio_key_matches_config: >-
      {%- set kl = (item | string | lower) -%}
      {%- set required = (lmstudio_effective_model | default('') | string | lower) -%}
      {%- set quant = (lmstudio_model_quant_tag | default('') | string | lower) -%}
      {%- set quant_norm = quant | regex_replace('[-_]', '') -%}
      {%- set base = (lmstudio_model_base_id | default('') | string | lower) -%}
      {%- set slug = (lmstudio_model_slug | default('') | string | lower) -%}
      {%- set strict = lmstudio_strict_model_key | default(false) | bool -%}
      {%- if '-mlx' in kl or '/mlx' in kl or '[mlx]' in kl or '_mlx' in kl -%}
      {{ false }}
      {%- elif required -%}
      {{
        (kl == required)
        or (kl | regex_replace('[-_]', '') == required | regex_replace('[-_]', ''))
        or (
          quant
          and (quant in kl or quant_norm in (kl | regex_replace('[-_]', '')))
          and (base in kl or slug in kl)
        )
      }}
      {%- else -%}
      {{ false }}
  loop: "{{ lms_disk_model_keys | default([]) }}"
  loop_control:
    label: "{{ item }}"
  register: lmstudio_key_match_results
  when: lms_disk_model_keys | default([]) | length > 0

- name: Collect matched LM Studio paths/keys for load
  set_fact:
    lmstudio_matched_keys: >-
      {{
        lmstudio_key_match_results.results | default([])
        | selectattr('ansible_facts.lmstudio_key_matches_config', 'defined')
        | selectattr('ansible_facts.lmstudio_key_matches_config')
        | map(attribute='item')
        | list
        | unique
      }}
  when: lmstudio_key_match_results is defined

- name: Default empty matched LM Studio path/key list
  set_fact:
    lmstudio_matched_keys: []
  when: lmstudio_key_match_results is not defined

- name: Drop MLX disk keys when vars.yml targets GGUF
  set_fact:
    lmstudio_matched_keys: >-
      {%- set out = [] -%}
      {%- for k in lmstudio_matched_keys | default([]) | map('string') | list -%}
        {%- set kl = k | lower -%}
        {%- if not ('-mlx' in kl or '/mlx' in kl or '[mlx]' in kl or '_mlx' in kl) -%}
          {%- set _ = out.append(k) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ out }}
  when: lmstudio_prefers_gguf | default(false) | bool

- name: Prefer matched LM Studio load paths over keys
  set_fact:
    lmstudio_matched_paths: >-
      {{
        (
          lmstudio_matched_keys | default([])
          | select('in', lms_disk_model_paths | default([]))
          | list
        )
        + (
          lmstudio_matched_keys | default([])
          | reject('in', lms_disk_model_paths | default([]))
          | list
        )
      }}

- name: Resolve LM Studio load candidate paths/keys
  set_fact:
    lmstudio_load_candidates:
      - "{{ lmstudio_effective_model }}"
    lmstudio_disk_model_key: "{{ lmstudio_effective_model }}"
    lmstudio_model_on_disk: >-
      {{
        (lmstudio_matched_keys | default([]) | length > 0)
        or (
          (lmstudio_effective_model | lower) in (lms_disk_model_keys | default([]) | map('lower') | list)
        )
        or (
          (lmstudio_log_confirms_download | default(false) | bool)
          and (
            (lmstudio_log_load_key | default('') | lower == lmstudio_effective_model | lower)
            or (lmstudio_log_load_key | default('') | trim | length == 0)
          )
          and not (
            (lmstudio_prefers_gguf | default(false) | bool)
            and (
              (lmstudio_log_disk_hint | default('') | lower is search('(?i)(-mlx|/mlx|\\[mlx\\]|_mlx)'))
              or (lmstudio_log_load_key | default('') | lower is search('(?i)(-mlx|/mlx|\\[mlx\\]|_mlx)'))
            )
          )
        )
      }}
