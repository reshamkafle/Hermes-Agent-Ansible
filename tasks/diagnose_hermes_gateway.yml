---
# Print actionable diagnostics when the Hermes gateway fails to start or stay up.
# Requires: target_home, lmstudio_base_url, lmstudio_effective_model

- name: Check LM Studio endpoint is reachable
  uri:
    url: "{{ lmstudio_base_url | regex_replace('/?$', '') }}/models"
    method: GET
    status_code: 200
    headers: "{{ {'Authorization': 'Bearer ' + (hermes_model_api_key | default('lm-studio', true)) } if (hermes_model_api_key | default('') | trim | length > 0) else omit }}"
  register: gateway_diag_lmstudio
  failed_when: false
  tags:
    - hermes_agents

- name: Check Hermes gateway process is running (macOS)
  shell: pgrep -f "[h]ermes.*gateway run" >/dev/null 2>&1
  args:
    executable: /bin/bash
  register: gateway_diag_process
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] == 'Darwin'
  tags:
    - hermes_agents

- name: Check GUI (Aqua) session is available (macOS)
  shell: launchctl print "gui/$(id -u)" >/dev/null 2>&1
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ target_home }}"
  register: gateway_diag_aqua
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] == 'Darwin'
  tags:
    - hermes_agents

- name: Read LaunchAgent status (macOS)
  shell: |
    LABEL="com.hermes.gateway"
    for DOMAIN in "gui/$(id -u)" "user/$(id -u)"; do
      if launchctl print "${DOMAIN}/${LABEL}" >/dev/null 2>&1; then
        launchctl print "${DOMAIN}/${LABEL}" 2>&1
        exit 0
      fi
    done
    echo "Bad request."
    echo "Could not find service \"${LABEL}\" in domain for user gui: $(id -u)"
    echo "(LaunchAgent ${LABEL} is not loaded)"
    echo "  Fix: run ./start_gateway.sh to redeploy the plist and bootstrap launchd."
  args:
    executable: /bin/bash
  environment:
    HOME: "{{ target_home }}"
  register: gateway_diag_launchctl
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] == 'Darwin'
  tags:
    - hermes_agents

- name: Read recent gateway stderr log (macOS)
  shell: |
    STDERR="{{ target_home }}/.hermes/logs/gateway.stderr.log"
    STDOUT="{{ target_home }}/.hermes/logs/gateway.stdout.log"
    if [[ -f "$STDERR" ]]; then
      tail -n 25 "$STDERR"
    elif [[ -f "$STDOUT" ]]; then
      echo "(stderr log missing; showing gateway.stdout.log instead)"
      tail -n 25 "$STDOUT"
    else
      echo "(missing: $STDERR)"
      echo "  Hint: launchd creates these files on first start — run ./start_gateway.sh."
    fi
  args:
    executable: /bin/bash
  register: gateway_diag_stderr
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] == 'Darwin'
  tags:
    - hermes_agents

- name: Check Hermes gateway systemd service (Linux)
  shell: systemctl is-active hermes-workspace 2>&1
  register: gateway_diag_systemd
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] == 'Debian'
  become: true
  tags:
    - hermes_agents

- name: Read recent gateway journal (Linux)
  shell: journalctl -u hermes-workspace -n 25 --no-pager 2>&1 || echo "(no journal entries for hermes-workspace)"
  register: gateway_diag_journal
  changed_when: false
  failed_when: false
  when: ansible_facts['os_family'] == 'Debian'
  become: true
  tags:
    - hermes_agents

- name: Build Hermes gateway diagnostic report
  set_fact:
    gateway_diag_report: |
      === Hermes gateway diagnostics ===
      {% if gateway_diag_lmstudio.status | default(0) == 200 %}
      LM Studio: OK at {{ lmstudio_base_url }}
      {% else %}
      LM Studio: NOT reachable at {{ lmstudio_base_url }}.
        Fix: Run `lms daemon up`, `lms server start`, then `lms get {{ lmstudio_effective_model }}`.
      {% endif %}
      {% if ansible_facts['os_family'] == 'Darwin' %}
      {% if gateway_diag_aqua.rc | default(1) == 0 %}
      macOS GUI session (Aqua): OK — LaunchAgent can load in this session.
      {% else %}
      macOS GUI session (Aqua): NOT available — log in to the Mac desktop (not SSH-only).
        Fix: com.hermes.gateway uses LimitLoadToSessionType Aqua and needs an active GUI session.
      {% endif %}
      {% if gateway_diag_process.rc | default(1) == 0 %}
      Gateway process: running (`hermes gateway run`).
      {% else %}
      Gateway process: NOT running — likely crashed on startup.
        Fix: check {{ target_home }}/.hermes/logs/gateway.stderr.log
      {% endif %}
      LaunchAgent status:
      {{ gateway_diag_launchctl.stdout | default('(not loaded)') }}

      Recent gateway stderr (last 25 lines):
      {{ gateway_diag_stderr.stdout | default('(no log output)') }}
      {% elif ansible_facts['os_family'] == 'Debian' %}
      systemd hermes-workspace: {{ gateway_diag_systemd.stdout | default('unknown') | trim }}
      {% if gateway_diag_systemd.rc | default(1) == 0 %}
      Gateway service: active.
      {% else %}
      Gateway service: NOT active — likely crashed on startup.
        Fix: run `systemctl status hermes-workspace` and check the journal below.
      {% endif %}

      Recent gateway journal (last 25 lines):
      {{ gateway_diag_journal.stdout | default('(no journal output)') }}
      {% endif %}
      === End diagnostics ===
  tags:
    - hermes_agents

- name: Write Hermes gateway diagnostic report for display
  copy:
    content: "{{ gateway_diag_report }}\n"
    dest: "{{ target_home }}/.hermes/logs/gateway-diagnostics.txt"
    mode: "0644"
  tags:
    - hermes_agents

- name: Print Hermes gateway diagnostic report
  shell: cat "{{ target_home }}/.hermes/logs/gateway-diagnostics.txt"
  args:
    executable: /bin/bash
  changed_when: false
  tags:
    - hermes_agents
