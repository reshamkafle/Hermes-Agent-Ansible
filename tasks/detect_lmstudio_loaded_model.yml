---
# Detect whether the configured LM Studio model is already loaded in memory.
# Uses lms ls --json (loaded flag), lms ps --json, lms ps text, and GET /v1/models.
# Requires: lmstudio_lms_cmd, lmstudio_cli_env, lmstudio_match_needles, lmstudio_effective_model,
#           lmstudio_model_slug, lmstudio_model_slug_no_quant, lmstudio_base_url, lmstudio_model_base_id
# Optional: lmstudio_model_quant_tag, lmstudio_prefers_gguf
# Sets: lmstudio_model_already_loaded, lmstudio_loaded_detection_source, lms_ps_json, lms_api_models

- name: List LM Studio models on disk (for loaded-state detection)
  include_tasks: lmstudio_list_disk_models.yml

- name: Normalize LM Studio disk listing for loaded-state detection
  set_fact:
    lms_ls_loaded_flat_models: >-
      {%- set parsed = [] -%}
      {%- if lms_ls_raw.rc | default(1) == 0 -%}
        {%- set raw = lms_ls_raw.stdout | default('[]') | trim -%}
        {%- if raw | length > 0 and raw[0] == '[' -%}
          {%- set parsed = raw | from_json | default([]) -%}
        {%- endif -%}
      {%- endif -%}
      {%- set flat = [] -%}
      {%- for item in parsed -%}
        {%- if item.model is defined -%}
          {%- set _ = flat.append(item.model) -%}
          {%- for v in item.variants | default([]) -%}
            {%- if v is mapping -%}
              {%- set _ = flat.append(v) -%}
            {%- endif -%}
          {%- endfor -%}
        {%- else -%}
          {%- set _ = flat.append(item) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ flat }}

- name: List LM Studio models loaded in memory (CLI JSON)
  command: "{{ lmstudio_lms_cmd }} ps --json"
  environment: "{{ lmstudio_cli_env }}"
  register: lms_ps_json
  changed_when: false
  failed_when: false
  become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
  become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

- name: List LM Studio models loaded in memory (CLI text)
  command: "{{ lmstudio_lms_cmd }} ps"
  environment: "{{ lmstudio_cli_env }}"
  register: lms_ps_text
  changed_when: false
  failed_when: false
  become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
  become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

- name: List LM Studio models on disk (human-readable, for LOADED marker)
  command: "{{ lmstudio_lms_cmd }} ls"
  environment: "{{ lmstudio_cli_env }}"
  register: lms_ls_text
  changed_when: false
  failed_when: false
  become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
  become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

- name: Query LM Studio OpenAI-compatible models endpoint
  uri:
    url: "{{ lmstudio_base_url | regex_replace('/?$', '') }}/models"
    method: GET
    status_code: 200
    headers: "{{ {'Authorization': 'Bearer ' + (hermes_model_api_key | default('lm-studio', true)) } if (hermes_model_api_key | default('') | trim | length > 0) else omit }}"
  register: lms_api_models
  failed_when: false

- name: Normalize LM Studio ps --json entries
  set_fact:
    lms_ps_models: >-
      {%- set out = [] -%}
      {%- if lms_ps_json.rc | default(1) == 0 -%}
        {%- set raw = lms_ps_json.stdout | default('[]') | trim -%}
        {%- if raw | length > 0 -%}
          {%- if raw[0] == '[' -%}
            {%- set out = raw | from_json | default([]) -%}
          {%- elif raw[0] == '{' -%}
            {%- set parsed = raw | from_json | default({}) -%}
            {%- if parsed.models is defined -%}
              {%- set out = parsed.models | default([]) -%}
            {%- elif parsed.data is defined -%}
              {%- set out = parsed.data | default([]) -%}
            {%- else -%}
              {%- set out = [parsed] -%}
            {%- endif -%}
          {%- endif -%}
        {%- endif -%}
      {%- endif -%}
      {{ out }}
    lms_api_model_ids: >-
      {{
        (
          lms_api_models.json.data | default([])
          | map(attribute='id')
          | map('string')
          | list
        )
        if (lms_api_models.status | default(0) == 200)
        else []
      }}

- name: Collect loaded-model field values from all LM Studio sources
  set_fact:
    lms_loaded_field_values: >-
      {%- set vals = [] -%}
      {%- set needles = lmstudio_match_needles | default([]) -%}
      {%- set slug = lmstudio_model_slug_no_quant | default(lmstudio_model_slug | default('')) | string | lower -%}
      {%- set prefers_gguf = lmstudio_prefers_gguf | default(false) | bool -%}
      {%- set quant = lmstudio_model_quant_tag | default('') | string | lower -%}
      {%- set quant_norm = quant | regex_replace('[-_]', '') -%}
      {%- set required = lmstudio_effective_model | default('') | string | lower -%}
      {%- set base = lmstudio_model_base_id | default('') | string | lower -%}
      {%- set strict = lmstudio_strict_model_key | default(false) | bool -%}
      {%- for m in lms_ls_loaded_flat_models | default([]) -%}
        {%- set is_loaded = (
          (m.loaded | default(false) | bool)
          or (m.isLoaded | default(false) | bool)
          or (m.inMemory | default(false) | bool)
          or ((m.state | default('') | string | lower) in ['loaded', 'ready', 'active', 'running'])
          or ((m.status | default('') | string | lower) in ['loaded', 'ready', 'active', 'running'])
        ) -%}
        {%- if is_loaded -%}
          {%- for field in ['identifier', 'modelKey', 'path', 'indexedModelIdentifier', 'displayName', 'name', 'id', 'key'] -%}
            {%- if m[field] is defined and (m[field] | string | trim | length > 0) -%}
              {%- set val_l = (m[field] | string | lower | regex_replace('\\.gguf$', '')) -%}
              {%- if not (prefers_gguf and ('-mlx' in val_l or '/mlx' in val_l or '_mlx' in val_l)) -%}
                {%- set strict_match = (
                  required
                  and (
                    (val_l == required or required in val_l or val_l in required)
                    or (
                      quant
                      and (quant in val_l or quant_norm in (val_l | regex_replace('[-_]', '')))
                      and (base in val_l or slug in val_l)
                    )
                  )
                ) -%}
                {%- if strict_match -%}
                  {%- set _ = vals.append('ls:' ~ (m[field] | string)) -%}
                {%- endif -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {%- for m in lms_ps_models | default([]) -%}
        {%- for field in ['identifier', 'modelKey', 'path', 'indexedModelIdentifier', 'displayName', 'name', 'id'] -%}
          {%- if m[field] is defined and (m[field] | string | trim | length > 0) -%}
            {%- set val_l = (m[field] | string | lower | regex_replace('\\.gguf$', '')) -%}
            {%- if not (prefers_gguf and ('-mlx' in val_l or '/mlx' in val_l or '_mlx' in val_l)) -%}
              {%- set ps_match = (
                required
                and (
                  (val_l == required or required in val_l or val_l in required)
                  or (
                    quant
                    and (quant in val_l or quant_norm in (val_l | regex_replace('[-_]', '')))
                    and (base in val_l or slug in val_l)
                  )
                )
              ) -%}
              {%- if ps_match -%}
                {%- set _ = vals.append('ps:' ~ (m[field] | string)) -%}
              {%- endif -%}
            {%- endif -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endfor -%}
      {%- for api_id in lms_api_model_ids | default([]) -%}
        {%- set val_l = (api_id | string | lower) -%}
        {%- set val_base = val_l.split('/')[-1] -%}
        {%- set wanted_base = required.split('/')[-1] if required else '' -%}
        {%- if required and (
          val_l == required
          or required in val_l
          or val_l in required
          or (wanted_base and val_base == wanted_base)
        ) -%}
          {%- set _ = vals.append('api:' ~ (api_id | string)) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set ps_text = lms_ps_text.stdout | default('') | lower -%}
      {%- if (lms_ps_text.rc | default(1) == 0) and (ps_text | trim | length > 0) and required and (required in ps_text) -%}
        {%- set _ = vals.append('ps-text:' ~ required) -%}
      {%- endif -%}
      {%- set ls_text = lms_ls_text.stdout | default('') -%}
      {%- set ls_text_l = ls_text | lower -%}
      {%- set base = lmstudio_model_base_id | default('') | lower -%}
      {%- set required = lmstudio_effective_model | default('') | lower -%}
      {%- set strict = lmstudio_strict_model_key | default(false) | bool -%}
      {%- if (lms_ls_text.rc | default(1) == 0) and (ls_text is search('LOADED')) -%}
        {%- if required and (required in ls_text_l) -%}
          {%- set _ = vals.append('ls-text:loaded:' ~ required) -%}
        {%- endif -%}
      {%- endif -%}
      {{ vals | unique | list }}

- name: Detect configured model among loaded LM Studio field values
  set_fact:
    lmstudio_model_already_loaded: >-
      {%- set needles = lmstudio_match_needles | default([]) -%}
      {%- set slug = lmstudio_model_slug_no_quant | default(lmstudio_model_slug | default('')) | string | lower -%}
      {%- set quant = lmstudio_model_quant_tag | default('') | string | lower -%}
      {%- set quant_norm = quant | regex_replace('[-_]', '') -%}
      {%- set prefers_gguf = lmstudio_prefers_gguf | default(false) | bool -%}
      {%- set required = lmstudio_effective_model | default('') | string | lower -%}
      {%- set strict = lmstudio_strict_model_key | default(false) | bool -%}
      {%- set base = lmstudio_model_base_id | default('') | string | lower -%}
      {%- set ns = namespace(found=false) -%}
      {%- for val in lms_loaded_field_values | default([]) -%}
        {%- if not ns.found -%}
          {%- set val_l = (val | string | lower | regex_replace('^(ls|ps|api|ps-text):', '') | regex_replace(':.*$', '') | regex_replace('\\.gguf$', '')) -%}
          {%- set val_norm = val_l | regex_replace('[-_]', '') -%}
          {%- if val_l and not (prefers_gguf and ('-mlx' in val_l or '/mlx' in val_l or '_mlx' in val_l)) -%}
            {%- if required and (val_l == required or required in val_l or val_l in required) -%}
              {%- set ns.found = true -%}
            {%- elif quant_norm and required and (quant_norm in val_norm) and (base in val_l or slug in val_l) -%}
              {%- set ns.found = true -%}
            {%- elif val is search('^ls-text:loaded:') and required and (required in val_l) -%}
              {%- set ns.found = true -%}
            {%- endif -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ns.found }}
    lmstudio_loaded_detection_source: >-
      {%- set needles = lmstudio_match_needles | default([]) -%}
      {%- set slug = lmstudio_model_slug_no_quant | default(lmstudio_model_slug | default('')) | string | lower -%}
      {%- set quant = lmstudio_model_quant_tag | default('') | string | lower -%}
      {%- set quant_norm = quant | regex_replace('[-_]', '') -%}
      {%- set prefers_gguf = lmstudio_prefers_gguf | default(false) | bool -%}
      {%- set required = lmstudio_effective_model | default('') | string | lower -%}
      {%- set strict = lmstudio_strict_model_key | default(false) | bool -%}
      {%- set base = lmstudio_model_base_id | default('') | string | lower -%}
      {%- set ns = namespace(source='not detected') -%}
      {%- for val in lms_loaded_field_values | default([]) -%}
        {%- if ns.source == 'not detected' -%}
          {%- set val_l = (val | string | lower | regex_replace('^(ls|ps|api|ps-text):', '') | regex_replace(':.*$', '') | regex_replace('\\.gguf$', '')) -%}
          {%- set val_norm = val_l | regex_replace('[-_]', '') -%}
          {%- if val_l and not (prefers_gguf and ('-mlx' in val_l or '/mlx' in val_l or '_mlx' in val_l)) -%}
            {%- if val is search('^ls:') or val is search('^ls-text:loaded:') -%}
              {%- set ns.source = 'lms ls loaded: ' ~ (val | regex_replace('^(ls|ls-text:loaded):', '')) -%}
            {%- elif val is search('^ps-text:') -%}
              {%- set ns.source = 'lms ps text: ' ~ slug -%}
            {%- elif slug and (slug in val_l) -%}
              {%- set ns.source = 'slug match: ' ~ val -%}
            {%- elif prefers_gguf and slug and (val_l is search('(?i)(\\.gguf|q4_k_m|q8_0|gguf)')) and (slug in val_l) -%}
              {%- set ns.source = 'loaded gguf: ' ~ val -%}
            {%- elif prefers_gguf and quant_norm and slug and (quant_norm in val_norm) and (slug in val_l) -%}
              {%- set ns.source = 'loaded quant match: ' ~ val -%}
            {%- else -%}
              {%- for n in needles -%}
                {%- set n_l = (n | string | lower | regex_replace(':.*$', '')) -%}
                {%- if n_l and (n_l == val_l or n_l in val_l or val_l in n_l) -%}
                  {%- set ns.source = 'needle match: ' ~ val -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endif -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ ns.source }}

- name: Show LM Studio loaded-model detection result
  debug:
    msg: >-
      already_loaded={{ lmstudio_model_already_loaded | default(false) }} |
      required_key={{ lmstudio_effective_model | default('(unset)') }} |
      source={{ lmstudio_loaded_detection_source | default('unknown') }} |
      ls rc={{ lms_ls_raw.rc | default('?') }} |
      ps rc={{ lms_ps_json.rc | default('?') }} |
      ps-text rc={{ lms_ps_text.rc | default('?') }} |
      api status={{ lms_api_models.status | default('?') }} |
      loaded values={{ lms_loaded_field_values | default([]) | join(', ') }}
