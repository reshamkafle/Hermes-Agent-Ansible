---
# Resolve the Hermes home directory for this deploy target.
# Sets: target_home, hermes_home_dir, hermes_config_path, hermes_env_path

- name: Establish deployment target home directory
  set_fact:
    target_home: "{{ hermes_home if (ansible_facts['os_family'] == 'Debian') else ansible_user_dir }}"
    hermes_home_dir: >-
      {{ (hermes_home if (ansible_facts['os_family'] == 'Debian') else ansible_user_dir) ~ '/.hermes' }}
    hermes_config_path: >-
      {{ (hermes_home if (ansible_facts['os_family'] == 'Debian') else ansible_user_dir) ~ '/.hermes/config.yaml' }}
    hermes_env_path: >-
      {{ (hermes_home if (ansible_facts['os_family'] == 'Debian') else ansible_user_dir) ~ '/.hermes/.env' }}
