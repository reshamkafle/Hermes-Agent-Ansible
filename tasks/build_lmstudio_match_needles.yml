---
# Build normalized match needles for LM Studio model detection across download, verify, and load.
# Requires: lmstudio_model_base_id, lmstudio_effective_model
# Optional: lms_get_log_tail.stdout (download log tail)
# Sets: lmstudio_model_slug, lmstudio_model_slug_no_quant, lmstudio_log_load_key,
#       lmstudio_log_disk_hint, lmstudio_log_confirms_download, lmstudio_match_needles

- name: Derive LM Studio model slug variants from vars.yml
  set_fact:
    lmstudio_model_slug: "{{ lmstudio_model_base_id.split('/')[-1] | lower }}"
    lmstudio_model_quant_tag: >-
      {{
        (lmstudio_effective_model.split('@')[1] | lower)
        if ('@' in (lmstudio_effective_model | default('')))
        else ''
      }}
    lmstudio_model_slug_no_quant: >-
      {{
        (lmstudio_model_base_id.split('/')[-1] | lower)
        | regex_replace('[-_](4bit|8bit|q4_k_m|q8_0|mxfp4|gguf).*$', '')
        | regex_replace('@.*$', '')
        | trim
      }}

- name: Extract LM Studio load key hint from download log
  set_fact:
    lmstudio_log_load_key_raw: >-
      {{
        (
          (lms_get_log_tail.stdout | default('') if (lms_get_log_tail is defined) else '')
          | regex_findall('(?i)lms load\\s+(\\S+)', ignorecase=true)
          | last
          | default('')
          | trim
          | regex_replace('--yes$', '')
          | trim
        )
      }}

- name: Extract LM Studio disk path hint from download log
  set_fact:
    lmstudio_log_disk_hint_raw: >-
      {{
        (
          (lms_get_log_tail.stdout | default('') if (lms_get_log_tail is defined) else '')
          | regex_findall('(?i)(?:satisfied|already downloaded|model loaded successfully in)\\s+([^\\n\\r]+)', ignorecase=true)
          | map('trim')
          | map('regex_replace', '\\s+\\[(?:mlx|gguf)\\]\\s*$', '')
          | map('trim')
          | reject('equalto', '')
          | list
          | last
          | default('')
        )
      }}
  when: lms_get_log_tail is defined

- name: Default empty LM Studio disk path hint from download log
  set_fact:
    lmstudio_log_disk_hint_raw: ''
  when: lms_get_log_tail is not defined

- name: Reject invalid LM Studio load key hints from download log
  set_fact:
    lmstudio_log_load_key: >-
      {{
        lmstudio_log_load_key_raw
        if (
          (lmstudio_log_load_key_raw | default('') | trim | length >= 4)
          and (lmstudio_log_load_key_raw | lower not in ['lms', 'load', '--yes', '-y', 'yes'])
          and not (
            (lmstudio_prefers_gguf | default(false) | bool)
            and (lmstudio_log_load_key_raw | lower is search('(?i)(-mlx|/mlx|\\[mlx\\]|_mlx)'))
          )
          and not (
            (lmstudio_strict_model_key | default(false) | bool)
            and ('@' not in lmstudio_log_load_key_raw)
            and not (
              (lmstudio_model_quant_tag | default('') | trim | length > 0)
              and (lmstudio_log_load_key_raw | lower is search(lmstudio_model_quant_tag | lower))
            )
          )
        )
        else ''
      }}

- name: Reject invalid LM Studio disk path hints from download log
  set_fact:
    lmstudio_log_disk_hint: >-
      {{
        lmstudio_log_disk_hint_raw
        if (
          (lmstudio_log_disk_hint_raw | default('') | trim | length >= 4)
          and (lmstudio_log_disk_hint_raw | lower not in ['unknown', 'lms', 'load', '--yes', '-y', 'yes'])
          and not (
            (lmstudio_prefers_gguf | default(false) | bool)
            and (lmstudio_log_disk_hint_raw | lower is search('(?i)(-mlx|/mlx|\\[mlx\\]|_mlx)'))
          )
        )
        else ''
      }}

- name: Detect LM Studio download-complete message in log
  set_fact:
    lmstudio_log_confirms_download: >-
      {{
        (lms_get_log_tail.stdout | default('') | lower)
        is search(
          'model already downloaded|satisfied .*\\[gguf\\]'
          if (lmstudio_prefers_gguf | default(false) | bool)
          else 'model already downloaded|satisfied .*\\[mlx\\]|satisfied .*\\[gguf\\]'
        )
      }}
  when: lms_get_log_tail is defined

- name: Default LM Studio log download confirmation flag
  set_fact:
    lmstudio_log_confirms_download: false
  when: lms_get_log_tail is not defined

- name: Assemble LM Studio match needle list
  set_fact:
    lmstudio_match_needles: >-
      {{
        (
          (
            [lmstudio_effective_model, lmstudio_model_quant_tag, lmstudio_log_load_key, lmstudio_log_disk_hint]
            if (lmstudio_strict_model_key | default(false) | bool)
            else [
              lmstudio_effective_model,
              lmstudio_model_base_id,
              lmstudio_model_slug,
              lmstudio_model_slug_no_quant,
              lmstudio_model_quant_tag,
              lmstudio_log_load_key,
              lmstudio_log_disk_hint
            ]
          )
          | map('string')
          | map('trim')
          | reject('equalto', '')
          | map('lower')
          | map('regex_replace', ':.*$', '')
          | unique
          | list
        )
      }}

- name: Extend LM Studio match needles with strict load candidates only
  set_fact:
    lmstudio_match_needles: >-
      {{
        (
          lmstudio_match_needles | default([])
          + (
            lmstudio_load_candidates | default([])
            | map('string')
            | map('trim')
            | reject('equalto', '')
            | select('match', '.*@.*', ignorecase=true)
            | list
          )
          + (
            lmstudio_load_candidates | default([])
            | map('string')
            | map('trim')
            | reject('equalto', '')
            | select('search', (lmstudio_model_quant_tag | default('')), ignorecase=true)
            | list
            if (lmstudio_model_quant_tag | default('') | trim | length > 0)
            else []
          )
        )
        | map('string')
        | map('trim')
        | reject('equalto', '')
        | map('lower')
        | unique
        | list
      }}
  when:
    - lmstudio_load_candidates | default([]) | length > 0
    - lmstudio_strict_model_key | default(false) | bool

- name: Extend LM Studio match needles with resolved load candidates
  set_fact:
    lmstudio_match_needles: >-
      {{
        (lmstudio_match_needles | default([]) + (lmstudio_load_candidates | default([])))
        | map('string')
        | map('trim')
        | reject('equalto', '')
        | map('lower')
        | unique
        | list
      }}
  when:
    - lmstudio_load_candidates | default([]) | length > 0
    - not (lmstudio_strict_model_key | default(false) | bool)
