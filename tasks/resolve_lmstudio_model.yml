---
# Resolve lmstudio_effective_model from vars.yml (no hardcoded model IDs).
# Requires: ansible_facts['os_family']
# Sets: lmstudio_effective_model, lmstudio_model_base_id, lmstudio_model_download_target,
#       lmstudio_get_cli_flags, lmstudio_runtime_model

- name: Require LM Studio model in vars.yml (Linux)
  fail:
    msg: Set lmstudio_model_linux in vars.yml (see vars.example..yml).
  when:
    - ansible_facts['os_family'] == 'Debian'
    - lmstudio_model_linux | default('') | trim | length == 0

- name: Require LM Studio model in vars.yml (macOS)
  fail:
    msg: Set lmstudio_model in vars.yml (see vars.example..yml).
  when:
    - ansible_facts['os_family'] != 'Debian'
    - lmstudio_model | default('') | trim | length == 0

- name: Resolve OS-specific LM Studio model identifier from vars.yml
  set_fact:
    lmstudio_effective_model: >-
      {{ lmstudio_model_linux if (ansible_facts['os_family'] == 'Debian') else lmstudio_model }}
    lmstudio_model_base_id: >-
      {{ (lmstudio_model_linux if (ansible_facts['os_family'] == 'Debian') else lmstudio_model).split('@')[0] }}
    lmstudio_runtime_model: >-
      {{ lmstudio_model_linux if (ansible_facts['os_family'] == 'Debian') else lmstudio_model }}

# Community models must use a full https://huggingface.co/... URL for `lms get`.
# Passing org/repo (even lmstudio-community/gemma-4-12B-it-MLX-4bit) still hits LM Studio's
# artifact resolver and can mis-resolve to the wrong staff pick (e.g. gemma-4-e2b).
- name: Resolve LM Studio non-interactive download target
  set_fact:
    lmstudio_model_download_target: >-
      {{
        (lmstudio_model_download_url | default('') | trim)
        if (lmstudio_model_download_url | default('') | trim | length > 0)
        else (
          lmstudio_effective_model
          if (lmstudio_effective_model is match('^https?://'))
          else (
            'https://huggingface.co/' ~ lmstudio_effective_model
            if ('/' in lmstudio_effective_model)
            else lmstudio_effective_model
          )
        )
      }}
    lmstudio_get_cli_flags: >-
      {{
        '--yes'
        if (
          (lmstudio_model_download_url | default('') | trim | length > 0)
          or (lmstudio_effective_model is match('^https?://'))
          or ('/' in lmstudio_effective_model)
        )
        else (
          '--gguf --yes' if (ansible_facts['os_family'] == 'Debian') else '--mlx --yes'
        )
      }}

- name: Show LM Studio model download plan
  debug:
    msg: >-
      vars.yml model: {{ lmstudio_effective_model }} |
      download: lms get {{ lmstudio_model_download_target }} {{ lmstudio_get_cli_flags }} |
      load/config key: {{ lmstudio_runtime_model }} |
      load: lms load {{ lmstudio_runtime_model }} --yes

- name: Warn when macOS model is a short alias that LM Studio may mis-resolve
  debug:
    msg: >-
      lmstudio_model is "{{ lmstudio_effective_model }}" (a short hub alias).
      `lms get` with --mlx may resolve to a different staff pick
      (e.g. lmstudio-community/gemma-4-e2b-it-mlx-4bit instead of 12B).
      Use a full repo path in vars.yml, e.g. lmstudio-community/gemma-4-12B-it-MLX-4bit
      (playbooks auto-wrap org/repo as a Hugging Face URL for download).
  when:
    - ansible_facts['os_family'] != 'Debian'
    - lmstudio_get_cli_flags is search('--mlx')
