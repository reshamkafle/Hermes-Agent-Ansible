---
# Resolve lmstudio_effective_model from vars.yml / vars.yaml (via load_hermes_vars.yml).
# Never hardcode model IDs here — only read lmstudio_model / lmstudio_model_linux from the vars file.
# Requires: ansible_facts['os_family']
# Sets: lmstudio_effective_model, lmstudio_model_base_id, lmstudio_model_download_target,
#       lmstudio_get_cli_flags, lmstudio_runtime_model, lmstudio_prefers_gguf,
#       lmstudio_model_quant_tag, lmstudio_strict_model_key

- name: Require LM Studio model in vars.yml (Linux)
  fail:
    msg: Set lmstudio_model_linux in vars.yml (see vars.example..yml).
  when:
    - ansible_facts['os_family'] == 'Debian'
    - lmstudio_model_linux | default('') | trim | length == 0

- name: Require LM Studio model in vars.yml (macOS)
  fail:
    msg: Set lmstudio_model in vars.yml (see vars.example..yml).
  when:
    - ansible_facts['os_family'] != 'Debian'
    - lmstudio_model | default('') | trim | length == 0

- name: Resolve OS-specific LM Studio model identifier from vars.yml
  vars:
    lmstudio_vars_model: >-
      {{ lmstudio_model_linux if (ansible_facts['os_family'] == 'Debian') else lmstudio_model }}
  set_fact:
    lmstudio_effective_model: "{{ lmstudio_vars_model }}"
    lmstudio_model_base_id: >-
      {{
        lmstudio_vars_model.split('@')[0]
        | regex_replace('[-_](qat|q4_k_m|q8_0|4bit|8bit|mxfp4)$', '', ignorecase=true)
      }}
    lmstudio_runtime_model: "{{ lmstudio_vars_model }}"
    lmstudio_model_quant_tag: >-
      {{
        (lmstudio_vars_model.split('@')[1] | lower)
        if ('@' in (lmstudio_vars_model | default('')))
        else (
          'q4_k_m'
          if (lmstudio_vars_model | lower is search('q4_k_m'))
          else (
            'q8_0'
            if (lmstudio_vars_model | lower is search('q8_0'))
            else (
              'qat'
              if (lmstudio_vars_model | lower is search('[-_]qat'))
              else ''
            )
          )
        )
      }}
    lmstudio_strict_model_key: >-
      {{
        ('@' in (lmstudio_vars_model | default('')))
        or ('.gguf' in (lmstudio_vars_model | default('') | lower))
        or (lmstudio_vars_model | lower is search('[-_]qat$'))
        or (lmstudio_vars_model | lower is search('q4_k_m'))
        or (lmstudio_vars_model | lower is search('q8_0'))
      }}

# Set lmstudio_model_download_url to a full https://huggingface.co/... URL for `lms get`.
# Passing org/repo or staff picks alone can hit LM Studio's artifact resolver and mis-resolve.
- name: Resolve LM Studio non-interactive download target
  set_fact:
    lmstudio_model_download_target: >-
      {{
        (lmstudio_model_download_url | default('') | trim)
        if (lmstudio_model_download_url | default('') | trim | length > 0)
        else (
          lmstudio_effective_model
          if (lmstudio_effective_model is match('^https?://'))
          else (
            'https://huggingface.co/' ~ lmstudio_effective_model
            if ('/' in lmstudio_effective_model)
            else lmstudio_effective_model
          )
        )
      }}
    lmstudio_prefers_gguf: >-
      {{
        (ansible_facts['os_family'] == 'Debian')
        or ('@' in (lmstudio_effective_model | default('')))
        or (lmstudio_effective_model | lower is search('[-_]qat$'))
        or ('GGUF' in (lmstudio_model_download_url | default('') | upper))
        or ('GGUF' in (lmstudio_effective_model | upper))
        or ('gguf' in (lmstudio_effective_model | lower))
      }}
    lmstudio_get_cli_flags: >-
      {{
        '--gguf --yes' if (
          (ansible_facts['os_family'] == 'Debian')
          or ('@' in (lmstudio_effective_model | default('')))
          or (lmstudio_effective_model | lower is search('[-_]qat$'))
          or ('GGUF' in (lmstudio_model_download_url | default('') | upper))
          or ('GGUF' in (lmstudio_effective_model | upper))
          or ('gguf' in (lmstudio_effective_model | lower))
        )
        else '--mlx --yes'
      }}

- name: Require GGUF staff pick with quant tag in vars.yml
  fail:
    msg: >-
      lmstudio_model must include a quant suffix for GGUF (e.g. google/gemma-4-12b-qat or org/model@q4_k_m).
      Set lmstudio_model / lmstudio_model_linux in {{ hermes_vars_path | default('vars.yml') }}.
      Bare google/gemma-4-12b without -qat or @quant matches MLX variants and is rejected.
  when:
    - lmstudio_prefers_gguf | default(false) | bool
    - not (lmstudio_strict_model_key | default(false) | bool)
    - not ('.gguf' in (lmstudio_effective_model | default('') | lower))

- name: Show LM Studio model download plan
  debug:
    msg: >-
      vars.yml model: {{ lmstudio_effective_model }} |
      download: lms get {{ lmstudio_model_download_target }} {{ lmstudio_get_cli_flags }} |
      load/config key: {{ lmstudio_runtime_model }} |
      load: lms load {{ lmstudio_runtime_model }} --context-length {{ hermes_model_context_length | default(65536) }} --yes

- name: Warn when model download URL is not set (artifact resolver may mis-pick)
  debug:
    msg: >-
      lmstudio_model_download_url is not set for "{{ lmstudio_effective_model }}".
      `lms get` may resolve to a different staff pick (e.g. gemma-4-e2b instead of 12B).
      Set lmstudio_model_download_url in vars.yml, e.g.
      https://huggingface.co/lmstudio-community/gemma-4-12B-it-GGUF
  when:
    - lmstudio_model_download_url | default('') | trim | length == 0
    - not (lmstudio_effective_model is match('^https?://'))
