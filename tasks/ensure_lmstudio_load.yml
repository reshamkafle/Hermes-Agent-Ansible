---
# Load the configured LM Studio model into memory when not already loaded.
# Requires: lmstudio_home, lmstudio_lms_cmd, target_home, target_user, hermes_path_prefix,
#           lmstudio_model_base_id, lmstudio_disk_model_key, lmstudio_load_candidates,
#           hermes_model_api_key
# Sets: lmstudio_model_loaded

- name: Define LM Studio CLI environment (model load)
  import_tasks: lmstudio_cli_environment.yml

- name: Ensure LM Studio model facts are resolved before load
  import_tasks: resolve_lmstudio_model.yml

- name: Ensure Hermes log directory exists (for lms load output)
  file:
    path: "{{ target_home }}/.hermes/logs"
    state: directory
    mode: '0755'
  become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
  become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

- name: Read LM Studio download log before load detection
  include_tasks: read_lmstudio_get_log_tail.yml

- name: Build LM Studio model match needles for load detection
  include_tasks: build_lmstudio_match_needles.yml

- name: Detect configured LM Studio model already loaded in memory
  include_tasks: detect_lmstudio_loaded_model.yml

- name: Remember whether load can be skipped because model is already in memory
  set_fact:
    lmstudio_skip_load_due_to_memory: "{{ lmstudio_model_already_loaded | default(false) | bool }}"

- name: Confirm LM Studio model on disk before load
  include_tasks: verify_lmstudio_model_on_disk.yml
  when: not (lmstudio_skip_load_due_to_memory | default(false) | bool)

- name: Require LM Studio model on disk before load
  fail:
    msg: >-
      Cannot load {{ lmstudio_model_base_id }} — model is not on disk.
      Re-run ./deploy_local.sh to download automatically.
      Log: {{ target_home }}/.hermes/logs/lms-get.log
  when:
    - not (lmstudio_skip_load_due_to_memory | default(false) | bool)
    - not (lmstudio_model_on_disk | default(false) | bool)

- name: Refresh LM Studio model match needles after disk verify
  include_tasks: build_lmstudio_match_needles.yml
  when: not (lmstudio_skip_load_due_to_memory | default(false) | bool)

- name: Show LM Studio model load plan
  debug:
    msg: >-
      lms load candidates (in order): {{ lmstudio_load_candidates | default([]) | join(' → ') }} |
      context_length: {{ hermes_model_context_length | default(65536) }} |
      disk paths: {{ lms_disk_model_paths | default([]) | join(', ') }} |
      match needles: {{ lmstudio_match_needles | join(', ') }}

- name: Note configured model already loaded in memory
  debug:
    msg: >-
      LM Studio model already loaded (skipping lms load).
      Detected via: {{ lmstudio_loaded_detection_source | default('unknown') }}.
      Configured model: {{ lmstudio_effective_model }}.
  when: lmstudio_skip_load_due_to_memory | default(false) | bool

- name: Build ordered LM Studio load candidate list (strict staff pick key)
  set_fact:
    lmstudio_load_attempts:
      - "{{ lmstudio_effective_model }}"
  when:
    - lmstudio_strict_model_key | default(false) | bool
    - not (lmstudio_skip_load_due_to_memory | default(false) | bool)

- name: Build ordered LM Studio load candidate list (GGUF — vars.yml key only)
  set_fact:
    lmstudio_load_attempts:
      - "{{ lmstudio_effective_model }}"
  when:
    - not (lmstudio_strict_model_key | default(false) | bool)
    - lmstudio_prefers_gguf | default(false) | bool
    - not (lmstudio_skip_load_due_to_memory | default(false) | bool)

- name: Build ordered LM Studio load candidate list (non-GGUF)
  set_fact:
    lmstudio_load_attempts_raw: >-
      {{
        (
          [lmstudio_effective_model]
          + (lmstudio_load_candidates | default([]))
          + (
            [lmstudio_disk_model_key]
            if (lmstudio_disk_model_key | default('') | trim | length > 0)
            else []
          )
          + [lmstudio_model_base_id]
        )
        | map('string')
        | map('trim')
        | reject('equalto', '')
        | unique
        | list
      }}
  when:
    - not (lmstudio_strict_model_key | default(false) | bool)
    - not (lmstudio_prefers_gguf | default(false) | bool)
    - not (lmstudio_skip_load_due_to_memory | default(false) | bool)

- name: Filter MLX keys from non-GGUF load candidate list
  include_tasks: filter_lmstudio_mlx_keys.yml
  vars:
    lmstudio_keys_to_filter: "{{ lmstudio_load_attempts_raw | default([]) }}"
  when:
    - not (lmstudio_strict_model_key | default(false) | bool)
    - not (lmstudio_prefers_gguf | default(false) | bool)
    - not (lmstudio_skip_load_due_to_memory | default(false) | bool)
    - lmstudio_load_attempts_raw is defined

- name: Use filtered non-GGUF LM Studio load candidate list
  set_fact:
    lmstudio_load_attempts: "{{ lmstudio_filtered_keys | default(lmstudio_load_attempts_raw | default([])) }}"
  when:
    - not (lmstudio_strict_model_key | default(false) | bool)
    - not (lmstudio_prefers_gguf | default(false) | bool)
    - not (lmstudio_skip_load_due_to_memory | default(false) | bool)
    - lmstudio_load_attempts is not defined

- name: Show LM Studio load attempts
  debug:
    msg: >-
      lms load attempts (in order): {{ lmstudio_load_attempts | default([]) | join(' → ') }}
  when: not (lmstudio_skip_load_due_to_memory | default(false) | bool)

- name: Load LM Studio model into memory (macOS, try each candidate path/key)
  shell: |
    set -o pipefail
    LOG="{{ target_home }}/.hermes/logs/lms-load.log"
    LMS="{{ lmstudio_lms_cmd }}"
    CTX="{{ hermes_model_context_length | default(65536) }}"
    : > "$LOG"
    load_one() {
      local key="$1"
      echo "==> lms load $key --context-length $CTX --yes" >> "$LOG"
      if "$LMS" load "$key" --context-length "$CTX" --yes >> "$LOG" 2>&1; then
        echo "==> loaded: $key (context_length=$CTX)" >> "$LOG"
        return 0
      fi
      echo "==> load failed for: $key" >> "$LOG"
      return 1
    }
    {% for key in lmstudio_load_attempts | default([]) %}
    if load_one {{ key | quote }}; then exit 0; fi
    {% endfor %}
    echo "==> all load candidates failed" >> "$LOG"
    exit 1
  args:
    executable: /bin/bash
  environment: "{{ lmstudio_cli_env }}"
  async: "{{ lmstudio_load_async_seconds | default(3600) }}"
  poll: "{{ lmstudio_load_poll_interval | default(30) }}"
  register: lms_load_macos
  when:
    - ansible_facts['os_family'] != 'Debian'
    - not (lmstudio_skip_load_due_to_memory | default(false) | bool)
  become: false

- name: Load LM Studio model into memory (Linux / WSL2, try each candidate path/key)
  shell: |
    set -o pipefail
    LOG="{{ target_home }}/.hermes/logs/lms-load.log"
    LMS="{{ lmstudio_lms_cmd }}"
    CTX="{{ hermes_model_context_length | default(65536) }}"
    : > "$LOG"
    load_one() {
      local key="$1"
      echo "==> lms load $key --context-length $CTX --yes" >> "$LOG"
      if "$LMS" load "$key" --context-length "$CTX" --yes >> "$LOG" 2>&1; then
        echo "==> loaded: $key (context_length=$CTX)" >> "$LOG"
        return 0
      fi
      echo "==> load failed for: $key" >> "$LOG"
      return 1
    }
    {% for key in lmstudio_load_attempts | default([]) %}
    if load_one {{ key | quote }}; then exit 0; fi
    {% endfor %}
    echo "==> all load candidates failed" >> "$LOG"
    exit 1
  args:
    executable: /bin/bash
  environment: "{{ lmstudio_cli_env }}"
  async: "{{ lmstudio_load_async_seconds | default(3600) }}"
  poll: "{{ lmstudio_load_poll_interval | default(30) }}"
  register: lms_load_linux
  when:
    - ansible_facts['os_family'] == 'Debian'
    - not (lmstudio_skip_load_due_to_memory | default(false) | bool)
  become: true
  become_user: "{{ target_user }}"

- name: Record LM Studio load command exit status
  set_fact:
    lms_load_command_succeeded: >-
      {{
        (
          lms_load_macos is defined
          and not (lms_load_macos.skipped | default(false) | bool)
          and (lms_load_macos.rc | default(1) == 0)
        )
        or (
          lms_load_linux is defined
          and not (lms_load_linux.skipped | default(false) | bool)
          and (lms_load_linux.rc | default(1) == 0)
        )
      }}
  when: not (lmstudio_skip_load_due_to_memory | default(false) | bool)

- name: Re-detect configured LM Studio model after load attempt
  include_tasks: detect_lmstudio_loaded_model.yml
  when: not (lmstudio_skip_load_due_to_memory | default(false) | bool)

- name: Record post-load detection result
  set_fact:
    lmstudio_model_loaded_after_command: "{{ lmstudio_model_already_loaded | default(false) }}"
  when: not (lmstudio_skip_load_due_to_memory | default(false) | bool)

- name: Determine if LM Studio model load completed
  set_fact:
    lmstudio_model_loaded: >-
      {{
        (lmstudio_skip_load_due_to_memory | default(false) | bool)
        or (lms_load_command_succeeded | default(false) | bool)
        or (lmstudio_model_loaded_after_command | default(false) | bool)
      }}

- name: Read LM Studio load log tail on failure
  command: tail -n 50 "{{ target_home }}/.hermes/logs/lms-load.log"
  register: lms_load_log_tail
  changed_when: false
  failed_when: false
  when:
    - not (lmstudio_model_loaded | default(false) | bool)
    - not (lmstudio_skip_load_due_to_memory | default(false) | bool)

- name: Capture last LM Studio ps JSON on failure
  set_fact:
    lms_ps_after_load_debug: "{{ lms_ps_json.stdout | default('(lms ps unavailable)') | trim }}"
  when:
    - not (lmstudio_model_loaded | default(false) | bool)
    - not (lmstudio_skip_load_due_to_memory | default(false) | bool)

- name: Require LM Studio model load to succeed
  fail:
    msg: >-
      `lms load` failed for all candidate paths/keys:
      {{ lmstudio_load_attempts | default(lmstudio_load_candidates | default([])) | join(', ') }}.
      Disk paths from `lms ls`: {{ lms_disk_model_paths | default([]) | join(', ') | default('(none)') }}.
      {% if lmstudio_prefers_gguf | default(false) | bool %}
      vars.yml targets GGUF ({{ lmstudio_effective_model }}). MLX models on disk are ignored.
      Download GGUF if missing:
      {{ lmstudio_lms_cmd }} get {{ lmstudio_model_download_target }} {{ lmstudio_get_cli_flags }}
      {% endif %}
      Load command exit code:
      {{ lms_load_macos.rc | default(lms_load_linux.rc | default('n/a')) }}.
      Full log: {{ target_home }}/.hermes/logs/lms-load.log
      Last `lms ps --json`: {{ lms_ps_after_load_debug | default('(none)') }}
      Re-run: ./deploy_local.sh
      If guardrails block loading, set modelLoadingGuardrails mode to "off" in LM Studio settings.
      If the runtime is missing, open LM Studio → Settings → Runtime and update the engine.
      Last log lines:
      {{ lms_load_log_tail.stdout | default('(log empty or missing)') }}
  when:
    - not (lmstudio_model_loaded | default(false) | bool)
    - not (lmstudio_skip_load_due_to_memory | default(false) | bool)
