---
# Load the configured LM Studio model into memory when not already loaded.
# Requires: lmstudio_home, target_home, target_user, hermes_path_prefix,
#           lmstudio_effective_model, lmstudio_model_base_id, lmstudio_runtime_model,
#           hermes_model_api_key
# Sets: lmstudio_model_loaded

- name: Ensure Hermes log directory exists (for lms load output)
  file:
    path: "{{ target_home }}/.hermes/logs"
    state: directory
    mode: '0755'
  become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
  become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

- name: List LM Studio models loaded in memory
  command: "{{ lmstudio_home }}/bin/lms ps --json"
  environment: &lmstudio_load_env
    HOME: "{{ target_home }}"
    PATH: "{{ hermes_path_prefix }}:{{ ansible_facts['env']['PATH'] }}"
    LM_API_TOKEN: "{{ hermes_model_api_key | default('lm-studio', true) }}"
    TERM: dumb
    NO_COLOR: "1"
  register: lms_ps_json
  changed_when: false
  failed_when: false
  become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
  become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

- name: Parse loaded LM Studio model identifiers
  set_fact:
    lms_loaded_identifiers: >-
      {{
        (lms_ps_json.stdout | from_json | default([]))
        | map(attribute='identifier')
        | map('string')
        | list
      }}
  when: lms_ps_json.rc | default(1) == 0

- name: Default empty loaded LM Studio model identifier list
  set_fact:
    lms_loaded_identifiers: []
  when: lms_ps_json.rc | default(1) != 0

- name: Check if configured model is already loaded in memory
  set_fact:
    lmstudio_model_already_loaded: >-
      {{
        (
          lms_loaded_identifiers
          | select('equalto', lmstudio_runtime_model | default(lmstudio_effective_model))
          | list
          | length > 0
        )
        or (
          lms_loaded_identifiers
          | map('lower')
          | select('search', lmstudio_model_base_id | lower)
          | list
          | length > 0
        )
      }}

- name: Note configured model already loaded in memory
  debug:
    msg: >-
      LM Studio model already loaded:
      {{ lmstudio_runtime_model | default(lmstudio_effective_model) }}
      (skipping lms load)
  when: lmstudio_model_already_loaded | default(false) | bool

- name: Kick off LM Studio model load (macOS)
  shell: >-
    "{{ lmstudio_home }}/bin/lms" load
    {{ (lmstudio_runtime_model | default(lmstudio_effective_model)) | quote }}
    --yes
    >> "{{ target_home }}/.hermes/logs/lms-load.log" 2>&1
  environment: *lmstudio_load_env
  async: "{{ lmstudio_load_async_seconds | default(3600) }}"
  poll: 0
  register: lms_load_job_macos
  when:
    - ansible_facts['os_family'] != 'Debian'
    - not (lmstudio_model_already_loaded | default(false) | bool)
  become: false

- name: Kick off LM Studio model load (Linux / WSL2)
  shell: >-
    "{{ lmstudio_home }}/bin/lms" load
    {{ (lmstudio_runtime_model | default(lmstudio_effective_model)) | quote }}
    --yes
    >> "{{ target_home }}/.hermes/logs/lms-load.log" 2>&1
  environment: *lmstudio_load_env
  async: "{{ lmstudio_load_async_seconds | default(3600) }}"
  poll: 0
  register: lms_load_job_linux
  when:
    - ansible_facts['os_family'] == 'Debian'
    - not (lmstudio_model_already_loaded | default(false) | bool)
  become: true
  become_user: "{{ target_user }}"

- name: Wait for LM Studio model to appear in memory
  command: "{{ lmstudio_home }}/bin/lms ps --json"
  environment: *lmstudio_load_env
  register: lms_ps_poll
  changed_when: false
  failed_when: false
  until: >
    lms_ps_poll.rc == 0
    and (
      (
        (lms_ps_poll.stdout | from_json | default([]))
        | map(attribute='identifier')
        | map('string')
        | list
        | select('search', lmstudio_model_base_id)
        | list
        | length > 0
      )
      or (
        (lmstudio_runtime_model | default(lmstudio_effective_model))
        in (
          (lms_ps_poll.stdout | from_json | default([]))
          | map(attribute='identifier')
          | map('string')
          | list
        )
      )
    )
  retries: "{{ lmstudio_load_poll_attempts | default(120) }}"
  delay: "{{ lmstudio_load_poll_interval | default(15) }}"
  when: not (lmstudio_model_already_loaded | default(false) | bool)
  become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
  become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

- name: Determine if LM Studio model load completed
  set_fact:
    lmstudio_model_loaded: >-
      {{
        (lmstudio_model_already_loaded | default(false) | bool)
        or (
          lms_ps_poll is defined
          and lms_ps_poll.rc | default(1) == 0
          and (
            (
              (lms_ps_poll.stdout | from_json | default([]))
              | map(attribute='identifier')
              | map('string')
              | list
              | select('search', lmstudio_model_base_id)
              | list
              | length > 0
            )
            or (
              (lmstudio_runtime_model | default(lmstudio_effective_model))
              in (
                (lms_ps_poll.stdout | from_json | default([]))
                | map(attribute='identifier')
                | map('string')
                | list
              )
            )
          )
        )
      }}

- name: Read LM Studio load log tail on failure
  command: tail -n 40 "{{ target_home }}/.hermes/logs/lms-load.log"
  register: lms_load_log_tail
  changed_when: false
  failed_when: false
  when:
    - not (lmstudio_model_loaded | default(false) | bool)
    - not (lmstudio_model_already_loaded | default(false) | bool)

- name: Require LM Studio model load to succeed
  fail:
    msg: >-
      `lms load {{ lmstudio_runtime_model | default(lmstudio_effective_model) }} --yes`
      did not load the model within
      {{ (lmstudio_load_poll_attempts | default(120) | int)
         * (lmstudio_load_poll_interval | default(15) | int) }} seconds.
      Large MLX models can take several minutes on first load.
      Full log: {{ target_home }}/.hermes/logs/lms-load.log
      Try manually:
      {{ lmstudio_home }}/bin/lms load
      {{ lmstudio_runtime_model | default(lmstudio_effective_model) }} --yes
      Then verify with: {{ lmstudio_home }}/bin/lms ps
      If guardrails block loading, set modelLoadingGuardrails mode to "off" in LM Studio settings.
      Last log lines:
      {{ lms_load_log_tail.stdout | default('(log empty or missing)') }}
  when:
    - not (lmstudio_model_loaded | default(false) | bool)
    - not (lmstudio_model_already_loaded | default(false) | bool)
