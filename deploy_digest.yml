---
- name: Deploy Hermes Daily Morning Digest (News + Investment HTML)
  hosts: all
  gather_facts: true
  become: false
  vars_files:
    - vars.yml

  tasks:
    - name: Establish operational workspace path variables
      set_fact:
        target_home: "{{ hermes_home if (ansible_facts['os_family'] == 'Debian') else (ansible_facts['env']['HOME'] | default(lookup('env', 'HOME'))) }}"
        target_user: "{{ hermes_user if (ansible_facts['os_family'] == 'Debian') else (ansible_facts['env']['USER'] | default(ansible_user_id)) }}"

    - name: Resolve Hermes CLI path
      import_tasks: tasks/resolve_hermes_cmd.yml

    - name: Create dedicated digest outputs directory
      file:
        path: "{{ target_home }}/.hermes/workspace/digest"
        state: directory
        owner: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        group: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        mode: '0755'
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"

    - name: Create and inject Hermes Daily Morning Digest Skill
      copy:
        dest: "{{ target_home }}/.hermes/skills/daily_digest.md"
        owner: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        group: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        mode: '0644'
        content: |
          ---
          name: daily-morning-digest
          description: Combines tech news and investment reports into a Bootstrap HTML briefing for telegram_send_users.
          version: 1.0.0
          ---

          ## Objectives
          You are a Daily Briefing Publisher. Every morning at 6 AM, merge the latest IT/AI news digest and investment analytics into one polished Bootstrap HTML report and deliver it to the recipients configured in `TELEGRAM_SEND_USERS`.

          ## Operational Procedure
          1. Read the cached tech news report from `{{ target_home }}/.hermes/workspace/tech_news_report.md`.
          2. Read the cached investment report from `{{ target_home }}/.hermes/workspace/investment/report.md`.
          3. If either file is missing or empty, run the corresponding skill first (`tech-news-intelligence` or `stock-investment-tracker`), then re-read the file.
          4. Build a complete HTML5 document using Bootstrap 5 with this CDN in the `<head>`:
             `https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css`
             Structure the page with:
             - A hero header card titled **Hermes Daily Briefing** with today's date
             - A **Tech & AI Intelligence** section (convert news markdown to semantic HTML inside a Bootstrap card)
             - An **Investment Tracker** section (convert investment markdown tables to `<table class="table table-striped table-hover">`)
             - Responsive layout using `container`, `row`, `col`, `card`, `card-header`, and `card-body`
          5. Save the final HTML to `{{ target_home }}/.hermes/workspace/digest/daily_digest.html`.
          6. Deliver the digest to every user ID in the `TELEGRAM_SEND_USERS` environment variable (comma-separated numeric IDs):
             - Attach `{{ target_home }}/.hermes/workspace/digest/daily_digest.html` as a document using the `MEDIA:` prefix
             - Send each recipient a short plain-text summary noting that the full Bootstrap HTML report is attached
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"

    - name: Sync Hermes config, secrets, and runtime wrapper
      import_tasks: tasks/sync_hermes_config.yml

    - name: Configure 6 AM Daily Digest Cron Automation (Linux / WSL2)
      cron:
        name: "Run Daily Morning Hermes Digest (News + Investment HTML)"
        minute: "0"
        hour: "6"
        user: "{{ hermes_user }}"
        job: "{{ target_home }}/.hermes/bin/hermes-run.sh chat -Q -q 'Run the daily-morning-digest skill according to its instructions.' --skills daily-morning-digest --yolo"
      when: ansible_facts['os_family'] == 'Debian'
      become: true

    - name: Configure 6 AM Daily Digest LaunchAgent (macOS)
      template:
        src: "{{ playbook_dir }}/templates/com.hermes.dailydigest.plist.j2"
        dest: "{{ target_home }}/Library/LaunchAgents/com.hermes.dailydigest.plist"
        mode: '0644'
      when: ansible_facts['os_family'] == 'Darwin'

    - name: Load 6 AM Daily Digest LaunchAgent (macOS)
      shell: launchctl load -w "{{ target_home }}/Library/LaunchAgents/com.hermes.dailydigest.plist"
      when: ansible_facts['os_family'] == 'Darwin'
      become: false
      failed_when: false
