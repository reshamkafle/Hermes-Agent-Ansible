---
- name: Deploy Hermes Daily Morning Digest (News + Investment + Gold Trend Telegram HTML)
  hosts: all
  gather_facts: true
  become: false

  tasks:
    - name: Load deployment variables from vars.yml or vars.yaml
      import_tasks: tasks/load_hermes_vars.yml

    - name: Establish operational workspace path variables
      import_tasks: tasks/establish_target_home.yml

    - name: Set deployment user for file ownership
      set_fact:
        target_user: "{{ hermes_user if (ansible_facts['os_family'] == 'Debian') else (ansible_facts['env']['USER'] | default(ansible_user_id)) }}"

    - name: Resolve Hermes CLI path
      import_tasks: tasks/resolve_hermes_cmd.yml

    - name: Create dedicated digest outputs directory
      file:
        path: "{{ target_home }}/.hermes/workspace/digest"
        state: directory
        owner: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        group: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        mode: '0755'
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"

    - name: Create daily-morning-digest skill directory
      file:
        path: "{{ target_home }}/.hermes/skills/daily-morning-digest"
        state: directory
        owner: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        group: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        mode: '0755'
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"

    - name: Remove legacy flat daily digest skill files (Hermes resolves skill-name/SKILL.md only)
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ target_home }}/.hermes/skills/daily_digest.md"
        - "{{ target_home }}/.hermes/skills/daily-morning-digest.md"
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"

    - name: Create and inject Hermes Daily Morning Digest Skill
      copy:
        dest: "{{ target_home }}/.hermes/skills/daily-morning-digest/SKILL.md"
        owner: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        group: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        mode: '0644'
        content: |
          ---
          name: daily-morning-digest
          description: Combines tech news, investment, and gold trend reports into a Telegram HTML briefing for telegram_send_users.
          version: 1.1.0
          ---

          ## Objectives
          You are a Daily Briefing Publisher. Every morning at 6 AM, merge the latest IT/AI news digest, investment analytics, and gold 7-day trend outlook into one Telegram HTML message for the recipients configured in `TELEGRAM_SEND_USERS`.

          ## Operational Procedure
          1. Read the cached tech news report from `{{ target_home }}/.hermes/workspace/tech_news_report.md`.
          2. Read the cached investment report from `{{ target_home }}/.hermes/workspace/investment/report.md`.
          3. Read the cached gold trend report from `{{ target_home }}/.hermes/workspace/gold/report.md`.
          4. If any file is missing or empty, run the corresponding skill first (`tech-news-intelligence`, `stock-investment-tracker`, or `gold-trend-tracker`), then re-read the file.
          5. Build a **Telegram HTML message fragment** (not a full HTML5 document). Use **only** tags supported by the Telegram Bot API `parse_mode=HTML`:
             - `<b>` or `<strong>` — bold section headings
             - `<i>` or `<em>` — emphasis
             - `<u>` or `<ins>` — underline
             - `<s>`, `<strike>`, or `<del>` — strikethrough
             - `<a href="URL">text</a>` — links
             - `<code>` — inline code
             - `<pre>` — preformatted blocks (use for investment tables and multi-line data)
             - `<blockquote>` — quoted excerpts
             - `<tg-spoiler>` or `<span class="tg-spoiler">` — spoilers (optional)
             Do **not** use `<!DOCTYPE>`, `<html>`, `<head>`, `<body>`, `<div>`, `<p>`, `<br>`, `<hr>`, `<h1>`–`<h6>`, `<table>`, `<tr>`, `<td>`, Bootstrap, CSS, or CDN links.
             Escape literal `<`, `>`, and `&` in source text as `&lt;`, `&gt;`, and `&amp;`.
             Structure the message with blank lines (newline characters) between sections:
             - `<b>Hermes Daily Briefing</b>` with today's date on the next line
             - `<b>Tech &amp; AI Intelligence</b>` — convert news markdown to Telegram HTML (bold headlines, linked sources, blockquotes for key quotes)
             - `<b>Investment Tracker</b>` — reformat investment markdown tables as fixed-width text inside a `<pre>` block
             - `<b>Gold Trend (7-Day Outlook)</b>` — reformat gold trend markdown (price trend, key drivers, forward outlook) as fixed-width text inside a `<pre>` block
          6. Save the final Telegram HTML to `{{ target_home }}/.hermes/workspace/digest/daily_digest.html`.
          7. Do **not** call `send_message` or attempt Telegram delivery. The deployment runner (`hermes-daily-digest.sh`) sends the saved HTML to `TELEGRAM_SEND_USERS` after this skill completes.
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"

    - name: Sync Hermes config, secrets, and runtime wrapper
      import_tasks: tasks/sync_hermes_config.yml

    - name: Deploy daily digest runner (chat skill + hermes send to Telegram)
      template:
        src: "{{ playbook_dir }}/templates/hermes_daily_digest_run.sh.j2"
        dest: "{{ target_home }}/.hermes/bin/hermes-daily-digest.sh"
        mode: "0755"
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

    - name: Configure 6 AM Daily Digest Cron Automation (Linux / WSL2)
      cron:
        name: "Run Daily Morning Hermes Digest (News + Investment + Gold Telegram HTML)"
        minute: "0"
        hour: "6"
        user: "{{ hermes_user }}"
        job: "{{ target_home }}/.hermes/bin/hermes-daily-digest.sh"
      when: ansible_facts['os_family'] == 'Debian'
      become: true

    - name: Configure 6 AM Daily Digest LaunchAgent (macOS)
      template:
        src: "{{ playbook_dir }}/templates/com.hermes.dailydigest.plist.j2"
        dest: "{{ target_home }}/Library/LaunchAgents/com.hermes.dailydigest.plist"
        mode: '0644'
      when: ansible_facts['os_family'] == 'Darwin'

    - name: Load 6 AM Daily Digest LaunchAgent (macOS)
      shell: launchctl load -w "{{ target_home }}/Library/LaunchAgents/com.hermes.dailydigest.plist"
      when: ansible_facts['os_family'] == 'Darwin'
      become: false
      failed_when: false
