---
- name: Smoke test Hermes daily digest (news + investment via Telegram)
  hosts: localhost
  connection: local
  gather_facts: true

  tasks:
    - name: Require vars.yml beside this playbook
      stat:
        path: "{{ playbook_dir }}/vars.yml"
      register: hermes_vars_file

    - name: Fail when vars.yml is missing
      fail:
        msg: >-
          {{ playbook_dir }}/vars.yml not found. Copy vars.example..yml to
          vars.yml and fill in telegram_bot_token, firecrawl_api_key, and
          Telegram recipient IDs.
      when: not hermes_vars_file.stat.exists

    - name: Load deployment variables from vars.yml
      include_vars:
        file: "{{ playbook_dir }}/vars.yml"

    - name: Establish workspace path variables
      import_tasks: tasks/establish_target_home.yml

    - name: Set deployment user for file ownership
      set_fact:
        target_user: "{{ ansible_facts['env']['USER'] | default(ansible_user_id) }}"

    - name: Resolve LM Studio model from vars.yml
      import_tasks: tasks/resolve_lmstudio_model.yml

    - name: Validate credentials required for digest skills
      vars:
        hermes_telegram_recipient_ids: >-
          {{
            (
              (telegram_send_users | default([]))
              + (telegram_allowed_users | default([]))
              + ([telegram_chat_id] if (telegram_chat_id | default('') | trim | length > 0) else [])
            ) | map('string') | map('trim') | select('ne', '') | list
          }}
      assert:
        that:
          - telegram_bot_token | default('') | trim | length > 0
          - firecrawl_api_key | default('') | trim | length > 0
          - hermes_telegram_recipient_ids | length > 0
        fail_msg: >-
          Missing required values in {{ playbook_dir }}/vars.yml:
          {% if telegram_bot_token | default('') | trim | length == 0 %}
          telegram_bot_token is empty.
          {% endif %}
          {% if firecrawl_api_key | default('') | trim | length == 0 %}
          firecrawl_api_key is empty.
          {% endif %}
          {% if hermes_telegram_recipient_ids | length == 0 %}
          No Telegram recipients (set telegram_chat_id and/or telegram_allowed_users).
          {% endif %}

    - name: Resolve Hermes CLI path (no install)
      import_tasks: tasks/resolve_hermes_cmd.yml
      vars:
        hermes_install_if_missing: false

    - name: Check Hermes home directory exists
      stat:
        path: "{{ target_home }}/.hermes"
      register: hermes_home_stat

    - name: Require prior Hermes deploy
      assert:
        that:
          - hermes_home_stat.stat.exists
        fail_msg: >-
          {{ target_home }}/.hermes not found. Run ./deploy_local.sh first to
          install Hermes, skills, and Telegram configuration.

    - name: Check daily-morning-digest skill is deployed
      stat:
        path: "{{ target_home }}/.hermes/skills/daily-morning-digest/SKILL.md"
      register: digest_skill_stat

    - name: Require daily-morning-digest skill
      assert:
        that:
          - digest_skill_stat.stat.exists
        fail_msg: >-
          daily-morning-digest skill not found at
          {{ target_home }}/.hermes/skills/daily-morning-digest/SKILL.md.
          Run deploy_digest.yml or ./deploy_local.sh.

    - name: Sync Hermes config, secrets, and runtime wrapper from vars.yml
      import_tasks: tasks/sync_hermes_config.yml

    - name: Check Hermes model config exists
      stat:
        path: "{{ hermes_config_path }}"
      register: hermes_config_stat

    - name: Require Hermes model provider config
      assert:
        that:
          - hermes_config_stat.stat.exists
          - hermes_config_stat.stat.size | int > 0
        fail_msg: >-
          {{ hermes_config_path }} is missing or empty. Run
          deploy_hermes.yml or ./deploy_local.sh to deploy the LM Studio provider config.

    - name: Load deployed Hermes config.yaml for validation
      slurp:
        path: "{{ hermes_config_path }}"
      register: hermes_config_slurp

    - name: Require Hermes config synced to LM Studio (not stale Ollama/manual config)
      vars:
        hermes_config_text: "{{ hermes_config_slurp.content | b64decode }}"
        hermes_config_parsed: "{{ hermes_config_text | from_yaml }}"
        hermes_model_section: "{{ hermes_config_parsed.model | default({}) }}"
        hermes_compression_section: "{{ hermes_config_parsed.auxiliary.compression | default({}) }}"
        hermes_model_ctx: "{{ hermes_model_section.context_length | default(0) | int }}"
        hermes_compression_ctx: "{{ hermes_compression_section.context_length | default(0) | int }}"
      assert:
        that:
          - hermes_model_section.base_url | default('') == lmstudio_base_url
          - hermes_model_section.default | default('') == lmstudio_effective_model
          - hermes_model_ctx >= 64000
          - hermes_model_ctx == (hermes_model_context_length | default(65536) | int)
          - hermes_compression_ctx >= 64000
        fail_msg: >-
          {{ hermes_config_path }} was not synced from vars.yml.
          Hermes must use LM Studio at {{ lmstudio_base_url }} with model
          {{ lmstudio_effective_model }} and
          context_length >= 64000 (hermes_model_context_length in vars.yml).
          Parsed model section: {{ hermes_model_section | to_nice_json }}.
          Parsed compression section: {{ hermes_compression_section | to_nice_json }}.
          A running Hermes gateway can revert config.yaml — sync stops it first.
          LM Studio load context alone is not enough — re-run ./deploy_local.sh or this
          smoke test so sync_hermes_config.yml overwrites config.yaml.

    - name: Load deployed Hermes .env for validation
      slurp:
        path: "{{ hermes_env_path }}"
      register: hermes_env_slurp

    - name: Require Hermes .env synced to LM Studio (not stale Ollama)
      vars:
        hermes_env_text: "{{ hermes_env_slurp.content | b64decode }}"
      assert:
        that:
          - lmstudio_base_url in hermes_env_text
          - hermes_env_text is not search('127\\.0\\.0\\.1:11434')
        fail_msg: >-
          {{ hermes_env_path }} still points at Ollama (port 11434). Hermes auxiliary
          tasks with provider "main" read OPENAI_BASE_URL from .env — stale Ollama URLs
          cause ~6K context errors even when config.yaml is correct. Re-run this smoke test.

    - name: Verify LM Studio endpoint is reachable
      uri:
        url: "{{ lmstudio_base_url | regex_replace('/?$', '') }}/models"
        method: GET
        status_code: 200
        headers: "{{ {'Authorization': 'Bearer ' + (hermes_model_api_key | default('lm-studio', true)) } if (hermes_model_api_key | default('') | trim | length > 0) else omit }}"
      register: lmstudio_health
      failed_when: false

    - name: Require LM Studio to be running for digest smoke test
      assert:
        that:
          - lmstudio_health.status == 200
        fail_msg: >-
          LM Studio is not reachable at {{ lmstudio_base_url }}. Run
          `lms daemon up`, `lms server start`, and `lms get {{ lmstudio_effective_model }}`
          before the smoke test.

    - name: Ensure digest output directory exists
      file:
        path: "{{ target_home }}/.hermes/workspace/digest"
        state: directory
        mode: "0755"

    - name: Deploy daily digest runner for smoke test (same script as 6 AM scheduler)
      template:
        src: "{{ playbook_dir }}/templates/hermes_daily_digest_run.sh.j2"
        dest: "{{ hermes_home_dir }}/bin/hermes-daily-digest.sh"
        mode: "0755"

    - name: Resolve digest smoke test timeout
      set_fact:
        hermes_digest_smoke_timeout: "{{ smoke_test_timeout_seconds | default(7200) | int }}"
        hermes_digest_smoke_poll_interval: 30

    - name: Note digest smoke test may take a long time
      debug:
        msg: >-
          Running daily-morning-digest (skill + Telegram delivery). This often
          takes 45–90+ minutes on a local LLM. Ansible will poll every
          {{ hermes_digest_smoke_poll_interval }}s for up to
          {{ hermes_digest_smoke_timeout }}s — ignore transient poll messages
          until the task completes or hits the timeout.

    - name: Run Hermes daily morning digest (skill + Telegram delivery via hermes send)
      shell: |
        exec "{{ hermes_home_dir }}/bin/hermes-daily-digest.sh"
      args:
        executable: /bin/bash
      environment:
        HOME: "{{ target_home }}"
        HERMES_HOME: "{{ hermes_home_dir }}"
        PATH: "{{ hermes_path_prefix }}:{{ ansible_facts['env']['PATH'] }}"
      register: hermes_digest_run
      async: "{{ hermes_digest_smoke_timeout }}"
      poll: "{{ hermes_digest_smoke_poll_interval }}"
      failed_when: false

    - name: Fail when digest run timed out
      fail:
        msg: >-
          Hermes daily digest did not finish within {{ hermes_digest_smoke_timeout }}s.
          Cold runs scrape news + stocks via Firecrawl and can take 60–120+ min on a
          local LLM (hermes_model_context_length={{ hermes_model_context_length | default(65536) }}).
          Pre-warm caches by running the 5 AM news and midnight investment jobs once,
          then re-test. Or increase timeout:
          SMOKE_TEST_TIMEOUT=10800 ./test_hermes_daily_digest.sh
      when: hermes_digest_run.msg | default('') == 'Timeout exceeded'

    - name: Verify Hermes digest command succeeded
      assert:
        that:
          - hermes_digest_run.rc == 0
          - hermes_digest_run.stdout is search('Digest delivered to [1-9][0-9]* Telegram recipient')
        fail_msg: >-
          Hermes daily-morning-digest failed (rc={{ hermes_digest_run.rc }}).
          stdout: {{ hermes_digest_run.stdout | default('') | trim }}.
          stderr: {{ hermes_digest_run.stderr | default('') | trim }}.
          chat -Q does not deliver to Telegram — the runner must finish with
          "Digest delivered to N Telegram recipient(s)". Re-run deploy_digest.yml
          or ./deploy_local.sh to install ~/.hermes/bin/hermes-daily-digest.sh.
          If you see "Context length exceeded (N tokens)", check that
          {{ hermes_config_path }} and {{ hermes_env_path }} were synced
          (base_url={{ lmstudio_base_url }}, context_length={{ hermes_model_context_length | default(65536) }}) — not a stale Ollama
          .env on port 11434. Re-run ./deploy_local.sh, then reload LM Studio:
          `lms unload && lms load {{ lmstudio_effective_model }}
          --context-length {{ hermes_model_context_length | default(65536) }} --yes`.
          Check {{ target_home }}/.hermes/logs/dailydigest.stderr.log if present.

    - name: Verify combined digest Telegram HTML was generated
      stat:
        path: "{{ target_home }}/.hermes/workspace/digest/daily_digest.html"
      register: digest_html_stat

    - name: Require non-empty digest Telegram HTML artifact
      assert:
        that:
          - digest_html_stat.stat.exists
          - digest_html_stat.stat.size | int > 0
        fail_msg: >-
          Expected {{ target_home }}/.hermes/workspace/digest/daily_digest.html
          to exist after the skill run.

    - name: Confirm digest Telegram HTML includes news and investment content
      shell: grep -Eqi 'tech|investment|briefing' "{{ target_home }}/.hermes/workspace/digest/daily_digest.html"
      changed_when: false

    - name: Report smoke test success
      debug:
        msg: >-
          Hermes daily digest smoke test passed.
          Combined news + investment Telegram HTML:
          {{ target_home }}/.hermes/workspace/digest/daily_digest.html
          ({{ digest_html_stat.stat.size }} bytes).
          Check Telegram for the rendered digest message sent to your configured recipients.
