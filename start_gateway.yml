---
- name: Start Hermes gateway only
  hosts: all
  gather_facts: true
  become: false
  vars_files:
    - vars.yml

  tasks:
    - name: Establish deployment path variables
      set_fact:
        target_home: "{{ hermes_home if (ansible_facts['os_family'] == 'Debian') else (ansible_facts['env']['HOME'] | default(lookup('env', 'HOME'))) }}"
        target_user: "{{ hermes_user if (ansible_facts['os_family'] == 'Debian') else (ansible_facts['env']['USER'] | default(ansible_user_id)) }}"

    - name: Set Hermes PATH prefix for user-scoped installs
      set_fact:
        hermes_path_prefix: "{{ target_home }}/.lmstudio/bin:{{ target_home }}/.local/bin:/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin"

    - name: Resolve OS-specific LM Studio model identifier
      set_fact:
        lmstudio_effective_model: >-
          {{
            lmstudio_model_linux | default('google/gemma-4-12b@Q4_K_M')
            if (ansible_facts['os_family'] == 'Debian')
            else lmstudio_model
          }}

    - name: Resolve Hermes CLI path
      import_tasks: tasks/resolve_hermes_cmd.yml
      vars:
        hermes_install_if_missing: true

    - name: Sync Hermes config, secrets, and runtime wrapper
      import_tasks: tasks/sync_hermes_config.yml

    - name: Start Hermes gateway daemon
      import_tasks: tasks/start_hermes_gateway.yml

    - name: Run Hermes gateway diagnostics
      import_tasks: tasks/diagnose_hermes_gateway.yml

    - name: Require gateway to be healthy after diagnostics (macOS)
      assert:
        that:
          - gateway_diag_process.rc | default(1) == 0
        fail_msg: >-
          Hermes gateway process is not running. See the diagnostic report printed
          above and {{ target_home }}/.hermes/logs/gateway.stderr.log
      when: ansible_facts['os_family'] == 'Darwin'

    - name: Require gateway to be healthy after diagnostics (Linux)
      assert:
        that:
          - gateway_diag_systemd.rc | default(1) == 0
        fail_msg: >-
          Hermes gateway service is not active. See the diagnostic report printed
          above and `systemctl status hermes-workspace`.
      when: ansible_facts['os_family'] == 'Debian'
