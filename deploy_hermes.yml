---
- name: Cross-Platform Hermes Agent Workspace Deployment
  hosts: all
  gather_facts: true
  become: false
  vars_files:
    - vars.yml

  tasks:
    - name: Establish deployment path variables
      set_fact:
        target_home: "{{ hermes_home if (ansible_facts['os_family'] == 'Debian') else ansible_user_dir }}"
        target_user: "{{ hermes_user if (ansible_facts['os_family'] == 'Debian') else (ansible_facts['env']['USER'] | default(ansible_user_id)) }}"

    - name: Resolve LM Studio CLI path and PATH prefix
      import_tasks: tasks/resolve_lmstudio_cli.yml

    - name: Resolve LM Studio model from vars.yml
      import_tasks: tasks/resolve_lmstudio_model.yml

    - name: Detect and validate operating system family
      fail:
        msg: "This target OS system is not supported by this playbook. Use Ubuntu, Debian, macOS, or WSL2."
      when: ansible_facts['os_family'] not in ['Debian', 'Darwin']

    # --- System Package Management ---
    - name: Install required baseline dependencies (Linux / WSL2)
      apt:
        name: [curl, git, python3-pip, python3-venv, nodejs, npm, libatomic1]
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == 'Debian'
      become: true

    - name: Install required baseline dependencies (macOS via Homebrew)
      homebrew:
        name: [curl, git, python, node]
        state: present
      when: ansible_facts['os_family'] != 'Debian'
      become: false

    - name: Create execution system user for Hermes Agent
      user:
        name: "{{ hermes_user }}"
        shell: /bin/bash
        create_home: yes
      when: ansible_facts['os_family'] == 'Debian'
      become: true

    # --- Step 1: Install & Set Up LM Studio (llmster) ---
    - name: Install LM Studio via official installer (llmster)
      shell: curl -fsSL https://lmstudio.ai/install.sh | bash
      environment:
        HOME: "{{ target_home }}"
        PATH: "{{ hermes_path_prefix }}:{{ ansible_facts['env']['PATH'] }}"
      when: not lmstudio_lms_present | bool
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

    - name: Record fresh LM Studio CLI install
      set_fact:
        lmstudio_cli_was_installed: true
      when: not lmstudio_lms_present | bool

    - name: Re-resolve LM Studio CLI path after install
      import_tasks: tasks/resolve_lmstudio_cli.yml
      when: not lmstudio_lms_present | bool

    - name: Require LM Studio CLI after install
      fail:
        msg: >-
          LM Studio CLI not found after install (tried
          {{ lmstudio_home }}/bin/lms,
          {{ target_home }}/.cache/lm-studio/bin/lms, and
          {{ target_home }}/.lmstudio/bin/lms).
          Re-run: ./deploy_local.sh
      when: not lmstudio_lms_present | bool

    - name: Ensure Hermes bin directory exists (for lms wrapper)
      file:
        path: "{{ target_home }}/.hermes/bin"
        state: directory
        mode: '0755'
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

    - name: Install LM Studio CLI wrapper (~/.hermes/bin/lms on PATH for deploy)
      template:
        src: "{{ playbook_dir }}/templates/lms_wrapper.sh.j2"
        dest: "{{ target_home }}/.hermes/bin/lms"
        mode: '0755'
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

    - name: Add LM Studio CLI to shell PATH (lms bootstrap)
      command: "{{ lmstudio_lms_cmd }} bootstrap -y"
      environment:
        HOME: "{{ target_home }}"
        PATH: "{{ hermes_path_prefix }}:{{ ansible_facts['env']['PATH'] }}"
      changed_when: false
      failed_when: false
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

    - name: Bootstrap LM Studio runtime (PATH, daemon up, server start)
      import_tasks: tasks/bootstrap_lmstudio.yml

    - name: Download LM Studio model when missing on disk
      import_tasks: tasks/ensure_lmstudio_model.yml

    - name: Load LM Studio model into memory
      import_tasks: tasks/ensure_lmstudio_load.yml
      when: lmstudio_load_model | default(true) | bool

    - name: Configure LM Studio systemd service (Linux / WSL2)
      template:
        src: "{{ playbook_dir }}/templates/llmster.service.j2"
        dest: /etc/systemd/system/llmster.service
        mode: '0644'
      when:
        - ansible_facts['os_family'] == 'Debian'
        - lmstudio_start_server | default(true) | bool
      become: true
      notify: Reload systemd and start llmster

    # --- Step 2: Install Hermes Core CLI & Workspace ---
    - name: Resolve Hermes CLI path (install if missing)
      import_tasks: tasks/resolve_hermes_cmd.yml
      vars:
        hermes_install_if_missing: true

    - name: Initialize Hermes home directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ target_home }}/.hermes"
        - "{{ target_home }}/.hermes/skills"
        - "{{ target_home }}/.hermes/workspace"
        - "{{ target_home }}/.hermes/logs"
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

    - name: Bootstrap Hermes non-Python dependencies
      command: "{{ hermes_cmd }} postinstall"
      environment:
        HOME: "{{ target_home }}"
        PATH: "{{ hermes_path_prefix }}:{{ ansible_facts['env']['PATH'] }}"
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"
      changed_when: false
      failed_when: false

    # --- Step 3: Install Firecrawl Core Dependencies ---
    - name: Install native Firecrawl scraping dependencies inside Node workspace
      npm:
        name: "@mendable/firecrawl-js"
        path: "{{ target_home }}/.hermes/workspace"
        state: present
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"
      when: firecrawl_init_all | default(true) | bool

    - name: Verify Firecrawl npm package installation
      command: npm list @mendable/firecrawl-js
      args:
        chdir: "{{ target_home }}/.hermes/workspace"
      register: firecrawl_npm_check
      changed_when: false
      failed_when: firecrawl_npm_check.rc != 0
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"
      when: firecrawl_verify_install | default(true) | bool

    # --- Step 4: Map Environment Variable Structure ---
    - name: Sync Hermes config, secrets, and runtime wrapper
      import_tasks: tasks/sync_hermes_config.yml

    # --- Step 5: Start Daemon/Background Workers ---
    - name: Configure and mount Linux systemd service worker (Linux / WSL2)
      copy:
        dest: /etc/systemd/system/hermes-workspace.service
        mode: '0644'
        content: |
          [Unit]
          Description=Hermes Agent Gateway Daemon
          After=network.target llmster.service

          [Service]
          Type=simple
          User={{ hermes_user }}
          Environment=HOME={{ hermes_home }}
          Environment=PATH={{ lmstudio_home }}/bin:{{ hermes_home }}/.local/bin:/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin
          WorkingDirectory={{ hermes_home }}/.hermes
          ExecStart={{ target_home }}/.hermes/bin/hermes-run.sh gateway run --replace
          Restart=always

          [Install]
          WantedBy=multi-user.target
      when: ansible_facts['os_family'] == 'Debian'
      become: true

    - name: Start Hermes gateway daemon
      import_tasks: tasks/start_hermes_gateway.yml
      when: hermes_start_agents | default(true) | bool

  handlers:
    - name: Reload systemd and start llmster
      systemd:
        daemon_reload: yes
        name: llmster
        state: started
        enabled: yes
      when: ansible_facts['os_family'] == 'Debian'
      become: true
