---
- name: Cross-Platform Hermes Agent Workspace Deployment
  hosts: all
  gather_facts: true
  become: false
  vars_files:
    - vars.yml

  tasks:
    - name: Establish deployment path variables
      set_fact:
        target_home: "{{ hermes_home if (ansible_facts['os_family'] == 'Debian') else (ansible_facts['env']['HOME'] | default(lookup('env', 'HOME'))) }}"
        target_user: "{{ hermes_user if (ansible_facts['os_family'] == 'Debian') else (ansible_facts['env']['USER'] | default(ansible_user_id)) }}"

    - name: Set Hermes PATH prefix for user-scoped installs
      set_fact:
        hermes_path_prefix: "{{ target_home }}/.lmstudio/bin:{{ target_home }}/.local/bin:/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin"

    - name: Resolve LM Studio model from vars.yml
      import_tasks: tasks/resolve_lmstudio_model.yml

    - name: Detect and validate operating system family
      fail:
        msg: "This target OS system is not supported by this playbook. Use Ubuntu, Debian, macOS, or WSL2."
      when: ansible_facts['os_family'] not in ['Debian', 'Darwin']

    # --- System Package Management ---
    - name: Install required baseline dependencies (Linux / WSL2)
      apt:
        name: [curl, git, python3-pip, python3-venv, nodejs, npm, libatomic1]
        state: present
        update_cache: yes
      when: ansible_facts['os_family'] == 'Debian'
      become: true

    - name: Install required baseline dependencies (macOS via Homebrew)
      homebrew:
        name: [curl, git, python, node]
        state: present
      when: ansible_facts['os_family'] != 'Debian'
      become: false

    - name: Create execution system user for Hermes Agent
      user:
        name: "{{ hermes_user }}"
        shell: /bin/bash
        create_home: yes
      when: ansible_facts['os_family'] == 'Debian'
      become: true

    # --- Step 1: Install & Set Up LM Studio (llmster) ---
    - name: Read LM Studio home pointer when present
      slurp:
        src: "{{ target_home }}/.lmstudio-home-pointer"
      register: lmstudio_home_pointer
      failed_when: false
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

    - name: Set LM Studio home directory
      set_fact:
        lmstudio_home: >-
          {{
            (lmstudio_home_pointer.content | b64decode | trim)
            if (lmstudio_home_pointer is defined and lmstudio_home_pointer.content is defined)
            else (target_home ~ '/.lmstudio')
          }}

    - name: Check if LM Studio CLI (lms) is present
      stat:
        path: "{{ lmstudio_home }}/bin/lms"
      register: lms_bin_stat
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

    - name: Install LM Studio via official installer (llmster)
      shell: curl -fsSL https://lmstudio.ai/install.sh | bash
      environment:
        HOME: "{{ target_home }}"
        PATH: "{{ hermes_path_prefix }}:{{ ansible_facts['env']['PATH'] }}"
      when: not lms_bin_stat.stat.exists | bool
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

    - name: Record fresh LM Studio CLI install
      set_fact:
        lmstudio_cli_was_installed: true
      when: not lms_bin_stat.stat.exists | bool

    - name: Re-check LM Studio CLI after install
      stat:
        path: "{{ lmstudio_home }}/bin/lms"
      register: lms_bin_stat_after_install
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

    - name: Require LM Studio CLI after install
      fail:
        msg: >-
          LM Studio CLI not found at {{ lmstudio_home }}/bin/lms after install.
          Re-run the installer manually: curl -fsSL https://lmstudio.ai/install.sh | bash
      when: not lms_bin_stat_after_install.stat.exists | bool

    - name: Ensure LM Studio headless daemon is running
      import_tasks: tasks/ensure_lmstudio_daemon.yml

    - name: Download LM Studio model when missing on disk
      import_tasks: tasks/ensure_lmstudio_model.yml

    - name: Load LM Studio model into memory (macOS)
      command: "{{ lmstudio_home }}/bin/lms load {{ lmstudio_effective_model }}"
      environment:
        HOME: "{{ target_home }}"
        PATH: "{{ hermes_path_prefix }}:{{ ansible_facts['env']['PATH'] }}"
        LM_API_TOKEN: "{{ hermes_model_api_key | default('lm-studio', true) }}"
        TERM: dumb
        NO_COLOR: "1"
      register: lms_load_macos
      when:
        - ansible_facts['os_family'] != 'Debian'
        - lmstudio_load_model | default(true) | bool
      become: false
      failed_when: false

    - name: Load LM Studio model into memory (Linux / WSL2)
      command: "{{ lmstudio_home }}/bin/lms load {{ lmstudio_effective_model }}"
      environment:
        HOME: "{{ target_home }}"
        PATH: "{{ hermes_path_prefix }}:{{ ansible_facts['env']['PATH'] }}"
        LM_API_TOKEN: "{{ hermes_model_api_key | default('lm-studio', true) }}"
        TERM: dumb
        NO_COLOR: "1"
      register: lms_load_linux
      when:
        - ansible_facts['os_family'] == 'Debian'
        - lmstudio_load_model | default(true) | bool
      become: true
      become_user: "{{ target_user }}"
      failed_when: false

    - name: Require LM Studio model load to succeed
      fail:
        msg: >-
          `lms load {{ lmstudio_effective_model }}` failed.
          Update LM Studio to the latest version (Gemma 4 MLX needs a recent mlx-engine).
          See https://lmstudio.ai/models/gemma-4
          CLI output: {{ (lms_load_macos.stdout | default('')) ~ (lms_load_macos.stderr | default('')) ~ (lms_load_linux.stdout | default('')) ~ (lms_load_linux.stderr | default('')) | trim }}
      when:
        - lmstudio_load_model | default(true) | bool
        - >-
          (
            (lms_load_macos is defined and (lms_load_macos.rc | default(0) != 0))
            or (lms_load_linux is defined and (lms_load_linux.rc | default(0) != 0))
          )

    - name: Start LM Studio API server (macOS)
      command: "{{ lmstudio_home }}/bin/lms server start --port {{ lmstudio_server_port | default(1234) }}"
      environment:
        HOME: "{{ target_home }}"
        PATH: "{{ hermes_path_prefix }}:{{ ansible_facts['env']['PATH'] }}"
        LM_API_TOKEN: "{{ hermes_model_api_key | default('lm-studio', true) }}"
      when:
        - ansible_facts['os_family'] != 'Debian'
        - lmstudio_start_server | default(true) | bool
      become: false
      changed_when: false
      failed_when: false

    - name: Configure LM Studio systemd service (Linux / WSL2)
      template:
        src: "{{ playbook_dir }}/templates/llmster.service.j2"
        dest: /etc/systemd/system/llmster.service
        mode: '0644'
      when:
        - ansible_facts['os_family'] == 'Debian'
        - lmstudio_start_server | default(true) | bool
      become: true
      notify: Reload systemd and start llmster

    # --- Step 2: Install Hermes Core CLI & Workspace ---
    - name: Resolve Hermes CLI path (install if missing)
      import_tasks: tasks/resolve_hermes_cmd.yml
      vars:
        hermes_install_if_missing: true

    - name: Initialize Hermes home directories
      file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ target_home }}/.hermes"
        - "{{ target_home }}/.hermes/skills"
        - "{{ target_home }}/.hermes/workspace"
        - "{{ target_home }}/.hermes/logs"
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"

    - name: Bootstrap Hermes non-Python dependencies
      command: "{{ hermes_cmd }} postinstall"
      environment:
        HOME: "{{ target_home }}"
        PATH: "{{ hermes_path_prefix }}:{{ ansible_facts['env']['PATH'] }}"
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"
      changed_when: false
      failed_when: false

    # --- Step 3: Install Firecrawl Core Dependencies ---
    - name: Install native Firecrawl scraping dependencies inside Node workspace
      npm:
        name: "@mendable/firecrawl-js"
        path: "{{ target_home }}/.hermes/workspace"
        state: present
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"
      when: firecrawl_init_all | default(true) | bool

    - name: Verify Firecrawl npm package installation
      command: npm list @mendable/firecrawl-js
      args:
        chdir: "{{ target_home }}/.hermes/workspace"
      register: firecrawl_npm_check
      changed_when: false
      failed_when: firecrawl_npm_check.rc != 0
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"
      become_user: "{{ target_user if (ansible_facts['os_family'] == 'Debian') else omit }}"
      when: firecrawl_verify_install | default(true) | bool

    # --- Step 4: Map Environment Variable Structure ---
    - name: Sync Hermes config, secrets, and runtime wrapper
      import_tasks: tasks/sync_hermes_config.yml

    # --- Step 5: Start Daemon/Background Workers ---
    - name: Configure and mount Linux systemd service worker (Linux / WSL2)
      copy:
        dest: /etc/systemd/system/hermes-workspace.service
        mode: '0644'
        content: |
          [Unit]
          Description=Hermes Agent Gateway Daemon
          After=network.target llmster.service

          [Service]
          Type=simple
          User={{ hermes_user }}
          Environment=HOME={{ hermes_home }}
          Environment=PATH={{ hermes_home }}/.lmstudio/bin:{{ hermes_home }}/.local/bin:/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin
          WorkingDirectory={{ hermes_home }}/.hermes
          ExecStart={{ target_home }}/.hermes/bin/hermes-run.sh gateway run
          Restart=always

          [Install]
          WantedBy=multi-user.target
      when: ansible_facts['os_family'] == 'Debian'
      become: true

    - name: Start Hermes gateway daemon
      import_tasks: tasks/start_hermes_gateway.yml
      when: hermes_start_agents | default(true) | bool

  handlers:
    - name: Reload systemd and start llmster
      systemd:
        daemon_reload: yes
        name: llmster
        state: started
        enabled: yes
      when: ansible_facts['os_family'] == 'Debian'
      become: true
