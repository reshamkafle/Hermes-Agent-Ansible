---
- name: Deploy Hermes IT and AI Intelligence News Aggregator
  hosts: all
  gather_facts: true
  become: false
  vars_files:
    - vars.yml

  tasks:
    # Set workspace and home directory variables dynamically across hosts
    - name: Establish operational workspace path variables
      set_fact:
        target_home: "{{ hermes_home if (ansible_facts['os_family'] == 'Debian') else (ansible_facts['env']['HOME'] | default(lookup('env', 'HOME'))) }}"
        target_user: "{{ hermes_user if (ansible_facts['os_family'] == 'Debian') else (ansible_facts['env']['USER'] | default(ansible_user_id)) }}"

    - name: Resolve Hermes CLI path
      import_tasks: tasks/resolve_hermes_cmd.yml

    - name: Create dedicated Hermes skills directory if it doesn't exist
      file:
        path: "{{ target_home }}/.hermes/skills"
        state: directory
        owner: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        group: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        mode: '0755'
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"

    - name: Create and inject Hermes IT & AI Intelligence News Skill
      copy:
        dest: "{{ target_home }}/.hermes/skills/tech_news.md"
        owner: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        group: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        mode: '0644'
        content: |
          ---
          name: tech-news-intelligence
          description: Leverages Firecrawl to gather high-signal IT, infrastructure, product launches, and AI updates.
          version: 1.0.0
          ---
          
          ## Objectives
          You are an advanced IT Research Assistant. Your goal is to bypass the noise and extract actionable intelligence regarding new AI model weights, tooling, developer software releases, and enterprise infrastructure news.

          ## Operational Procedure
          1. Use the **Firecrawl Web Scraping tool** to check trending topics and technical headlines from the following key locations:
             - Hacker News (https://news.ycombinator.com) - Filtering for AI, LLMs, Open-source tool developments, and infrastructure.
             - TechCrunch (https://techcrunch.com/category/artificial-intelligence/) - For corporate AI product releases and tech industry pivots.
             - GitHub Trending (https://github.com/trending) - For emerging open-source developer tooling frameworks.
          2. Parse the extracted data to filter out low-value op-eds and clickbait.
          3. Structure the payload into clear categories:
             - **🤖 AI & LLM Breakthroughs:** Model releases, fine-tuning techniques, and framework updates.
             - **💻 Enterprise IT & DevOps:** Systems updates, cloud advancements, databases, and architectural frameworks.
             - **🛠️ Product & Developer Tooling Launches:** New apps, IDE features, and developer tool ecosystems.
          4. Format the summary explicitly inside Markdown blocks and cache it inside `{{ target_home }}/.hermes/workspace/tech_news_report.md`.
          5. Route the final formatted digest to all accounts registered in your Telegram broadcast group.
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"

    - name: Inject Hermes environment secrets from vars
      template:
        src: "{{ playbook_dir }}/templates/hermes.env.j2"
        dest: "{{ target_home }}/.hermes/.env"
        mode: '0600'
        owner: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        group: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"

    - name: Configure Morning Tech Intelligence Cron Automation (Linux / WSL2)
      cron:
        name: "Run Daily Morning Hermes IT and AI Intelligence Digest"
        minute: "0"
        hour: "5"
        user: "{{ hermes_user }}"
        job: "HOME={{ target_home }} PATH={{ hermes_path_prefix }}:$PATH {{ hermes_cmd }} chat -Q -q 'Run the tech-news-intelligence skill according to its instructions.' --skills tech-news-intelligence --yolo"
      when: ansible_facts['os_family'] == 'Debian'
      become: true

    - name: Configure Morning Automation LaunchAgent (macOS)
      template:
        src: "{{ playbook_dir }}/templates/com.hermes.technews.plist.j2"
        dest: "{{ target_home }}/Library/LaunchAgents/com.hermes.technews.plist"
        mode: '0644'
      when: ansible_facts['os_family'] == 'Darwin'