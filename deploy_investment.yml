---
- name: Deploy Hermes Investment Skill Tracking System with Midnight Crontab
  hosts: all
  gather_facts: true
  become: false

  tasks:
    - name: Load deployment variables from vars.yml or vars.yaml
      import_tasks: tasks/load_hermes_vars.yml

    # Set the path dynamically based on whether it's macOS or Linux/WSL2
    - name: Establish operational workspace path variables
      import_tasks: tasks/establish_target_home.yml

    - name: Set deployment user for file ownership
      set_fact:
        target_user: "{{ hermes_user if (ansible_facts['os_family'] == 'Debian') else (ansible_facts['env']['USER'] | default(ansible_user_id)) }}"

    - name: Resolve Hermes CLI path
      import_tasks: tasks/resolve_hermes_cmd.yml

    - name: Create dedicated Investment outputs directory
      file:
        path: "{{ target_home }}/.hermes/workspace/investment"
        state: directory
        owner: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        group: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        mode: '0755'
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"

    - name: Template active stock watchlist file into the workspace
      copy:
        dest: "{{ target_home }}/.hermes/workspace/investment/watchlist.txt"
        owner: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        group: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        mode: '0644'
        content: |
          # Watchlist managed by Ansible
          {% for stock in tracked_stocks %}
          {{ stock }}
          {% endfor %}
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"

    - name: Remove legacy flat investment skill files (Hermes resolves skill-name/SKILL.md only)
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ target_home }}/.hermes/skills/investment.md"
        - "{{ target_home }}/.hermes/skills/stock-investment-tracker.md"
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"

    - name: Create stock-investment-tracker skill directory
      file:
        path: "{{ target_home }}/.hermes/skills/stock-investment-tracker"
        state: directory
        owner: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        group: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        mode: '0755'
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"

    - name: Create and inject Hermes Custom Investment Skill
      copy:
        dest: "{{ target_home }}/.hermes/skills/stock-investment-tracker/SKILL.md"
        owner: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        group: "{{ hermes_user if ansible_facts['os_family'] == 'Debian' else omit }}"
        mode: '0644'
        content: |
          ---
          name: stock-investment-tracker
          description: Uses Firecrawl to scrape financial historical contexts and formulate 7-day predictive models.
          version: 1.0.0
          ---
          
          ## Objectives
          You are an automated Quantitative Analyst. Your job is to extract financial trends for the watchlist, gather data over the past 7 days, and output an extraction analysis alongside a 7-day horizon projection.

          ## Operational Procedure
          1. Read the list of target tickers located in `{{ target_home }}/.hermes/workspace/investment/watchlist.txt`.
          2. For each stock ticker found:
             - Call the **Firecrawl Web Scraping tool** to fetch historical financial performance and metrics spanning the **last 7 days**.
          3. Process the extracted records to construct a **7-day trend predictive analysis**.
          4. Format the final output cleanly in Markdown table structures and save the analysis inside `{{ target_home }}/.hermes/workspace/investment/report.md`.
          5. Broadcast this generated report actively to all configured recipient accounts linked in your secret variables registry over Telegram.
      become: "{{ 'yes' if (ansible_facts['os_family'] == 'Debian') else 'no' }}"

    - name: Sync Hermes config, secrets, and runtime wrapper
      import_tasks: tasks/sync_hermes_config.yml

    - name: Install Midnight Cron Automation (Linux / WSL2)
      cron:
        name: "Run Midnight Hermes Investment Analytics Report"
        minute: "0"
        hour: "0"
        user: "{{ hermes_user }}"
        job: "{{ target_home }}/.hermes/bin/hermes-run.sh chat -Q -q 'Run the stock-investment-tracker skill according to its instructions.' --skills stock-investment-tracker --yolo"
      when: ansible_facts['os_family'] == 'Debian'
      become: true

    - name: Configure Midnight Automation LaunchAgent (macOS)
      template:
        src: "{{ playbook_dir }}/templates/com.hermes.investment.plist.j2"
        dest: "{{ target_home }}/Library/LaunchAgents/com.hermes.investment.plist"
        mode: '0644'
      when: ansible_facts['os_family'] == 'Darwin'