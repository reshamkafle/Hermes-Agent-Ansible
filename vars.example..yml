# vars.yml


# --- System & Deployment Configurations ---
hermes_user: "hermes"
hermes_home: "/home/hermes"

# LM Studio model (macOS / Apple Silicon — MLX). Used as model.default on Darwin.
lmstudio_model: "google/gemma-4-12b"
# Linux / WSL2 GGUF fallback (MLX does not run on Linux).
lmstudio_model_linux: "google/gemma-4-12b@Q4_K_M"
lmstudio_base_url: "http://127.0.0.1:1234/v1"
lmstudio_server_port: 1234
lmstudio_load_model: true
lmstudio_start_server: true
# Seconds to wait after a fresh `lms` install before starting the daemon (first boot can be slow).
lmstudio_daemon_boot_wait_seconds: 30
# Quit the LM Studio GUI on macOS before starting the headless daemon (avoids port conflicts).
lmstudio_quit_gui_before_daemon: true
# Poll `lms daemon status` after `lms daemon up` (up to ~4 min per attempt).
lmstudio_daemon_status_poll_attempts: 24
lmstudio_daemon_status_poll_interval: 10
# Ansible async timeout for `lms daemon up` (command may block while the daemon boots).
lmstudio_daemon_up_async_seconds: 300
# Full down/up cycles when the daemon is still not running after polling.
lmstudio_daemon_up_retries: 3

# Hermes model routing (~/.hermes/config.yaml). LM Studio uses OpenAI-compat provider "custom".
hermes_model_provider: "custom"
# LM Studio API token when Require Authentication is on; use "lm-studio" when auth is off.
hermes_model_api_key: "lm-studio"
hermes_start_agents: true

# --- Firecrawl behavior ---
firecrawl_init_all: true
firecrawl_verify_install: true
firecrawl_use_browser_auth: false

# --- Private Integrations & API Credentials ---
telegram_bot_token: ""
firecrawl_api_key: ""

# --- Telegram (numeric IDs from @userinfobot or similar) ---
telegram_chat_id: ""
telegram_allowed_users:
  - ""  # Recipient A User ID

# --- Investment Tracker Stocks ---
tracked_stocks:
  - "VOO"
  - "QQQM"
  - "SCHD"
  - "SMH"
